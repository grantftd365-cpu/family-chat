<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>FamilyChat</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
<style>
/* ===== CSS Variables & Dark Mode ===== */
:root {
  --green:#07C160; --green-dark:#06AD56; --green-light:#95EC69;
  --bg:#EDEDED; --bg-dark:#D9D9D9; --card:#FFFFFF; --card-hover:#F7F7F7;
  --text:#111111; --text-sub:#888888; --text-light:#B2B2B2;
  --border:#E6E6E6; --danger:#FA5151; --link:#576B95;
  --chat-right:#95EC69; --chat-left:#FFFFFF;
  --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
  --header-bg:#EDEDED; --input-bg:#F7F7F7; --modal-bg:#FFFFFF;
  --shadow:0 1px 3px rgba(0,0,0,.08);
}
.dark {
  --bg:#111111; --bg-dark:#1C1C1E; --card:#1C1C1E; --card-hover:#2C2C2E;
  --text:#E5E5E5; --text-sub:#8E8E93; --text-light:#636366;
  --border:#38383A; --danger:#FF453A; --link:#64D2FF;
  --chat-right:#34C759; --chat-left:#2C2C2E;
  --header-bg:#1C1C1E; --input-bg:#2C2C2E; --modal-bg:#1C1C1E;
  --shadow:0 1px 3px rgba(0,0,0,.3);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); font-size:16px; overflow:hidden; }
input,textarea,button { font-family:inherit; font-size:16px; }
::-webkit-scrollbar { width:0; display:none; }

/* ===== App Shell ===== */
#app { height:100%; position:relative; overflow:hidden; }
.page { display:none; height:100%; flex-direction:column; position:absolute; inset:0; background:var(--bg); z-index:1; }
.page.active { display:flex; }

/* ===== Headers ===== */
.header {
  padding:12px 16px; padding-top:calc(12px + var(--safe-top));
  display:flex; align-items:center; gap:12px;
  min-height:56px; background:var(--header-bg); border-bottom:0.5px solid var(--border);
  position:relative; z-index:10;
}
.header-title { flex:1; font-size:17px; font-weight:600; text-align:center; }
.header .back { background:none; border:none; font-size:24px; color:var(--text); cursor:pointer; padding:4px 8px 4px 0; line-height:1; }
.header .action { background:none; border:none; font-size:20px; cursor:pointer; padding:4px; color:var(--text); }

/* ===== Login ===== */
.login-page { background:var(--bg); justify-content:flex-start; align-items:center; padding:0 24px; }
.login-hero { text-align:center; padding:80px 0 40px; }
.login-hero .logo { font-size:72px; margin-bottom:16px; }
.login-hero h1 { font-size:24px; font-weight:700; margin-bottom:6px; }
.login-hero p { font-size:14px; color:var(--text-sub); }
.login-form { width:100%; max-width:400px; }
.login-form .field { border-bottom:1px solid var(--border); }
.login-form .field input { width:100%; padding:16px 0; border:none; background:transparent; font-size:16px; outline:none; color:var(--text); }
.login-form .field input::placeholder { color:var(--text-light); }
.login-form .extra { display:none; }
.login-form .extra.show { display:block; }
.login-form .error { color:var(--danger); font-size:13px; padding:8px 0; display:none; text-align:center; }
.login-btn { width:100%; padding:14px; margin-top:24px; border:none; border-radius:8px; background:var(--green); color:#fff; font-size:17px; font-weight:500; cursor:pointer; }
.login-btn:active { opacity:.8; }
.login-switch { text-align:center; margin-top:16px; font-size:14px; color:var(--link); cursor:pointer; }

/* ===== Main Page ===== */
.main-page { background:var(--bg); }
.main-header { background:var(--header-bg); border-bottom:0.5px solid var(--border); padding:12px 16px; padding-top:calc(12px + var(--safe-top)); display:flex; justify-content:space-between; align-items:center; }
.main-header h1 { font-size:17px; font-weight:600; }
.main-header .actions { display:flex; gap:16px; }
.main-header .actions button { background:none; border:none; font-size:20px; cursor:pointer; color:var(--text); }

/* Tab Bar */
.tab-bar { display:flex; background:var(--card); border-top:0.5px solid var(--border); padding:4px 0; padding-bottom:calc(4px + var(--safe-bottom)); }
.tab-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; padding:4px 0; cursor:pointer; border:none; background:none; color:var(--text-sub); font-size:10px; transition:color .2s; position:relative; }
.tab-item.active { color:var(--green); }
.tab-item .icon { font-size:22px; line-height:1.2; }
.tab-item .badge { position:absolute; top:0; right:calc(50% - 18px); min-width:16px; height:16px; border-radius:8px; background:var(--danger); color:#fff; font-size:10px; line-height:16px; text-align:center; padding:0 4px; }
.tab-panel { display:none; flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.tab-panel.active { display:block; }

/* ===== Chat List ===== */
.chat-item { display:flex; align-items:center; padding:12px 16px; background:var(--card); border-bottom:0.5px solid var(--border); cursor:pointer; transition:background .1s; }
.chat-item:active { background:var(--card-hover); }
.chat-avatar { width:52px; height:52px; border-radius:6px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:28px; position:relative; background:var(--bg-dark); overflow:hidden; }
.chat-avatar img { width:100%; height:100%; object-fit:cover; }
.chat-body { flex:1; margin-left:12px; overflow:hidden; }
.chat-body .name { font-size:17px; font-weight:400; line-height:1.4; }
.chat-body .preview { font-size:14px; color:var(--text-sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.chat-meta { text-align:right; flex-shrink:0; margin-left:8px; }
.chat-meta .time { font-size:12px; color:var(--text-sub); }
.chat-meta .unread { display:inline-block; min-width:18px; height:18px; border-radius:9px; background:var(--danger); color:#fff; font-size:11px; text-align:center; line-height:18px; padding:0 5px; margin-top:4px; }

/* ===== Messages ===== */
.msgs { flex:1; overflow-y:auto; padding:12px 16px; -webkit-overflow-scrolling:touch; background:var(--bg); }
.msg-row { display:flex; gap:8px; margin-bottom:16px; max-width:85%; animation:msgIn .25s ease-out; }
.msg-row.right { margin-left:auto; flex-direction:row-reverse; }
.msg-row.left { margin-right:auto; }
@keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

.msg-av { width:40px; height:40px; border-radius:4px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:22px; background:var(--bg-dark); overflow:hidden; cursor:pointer; }
.msg-av img { width:100%; height:100%; object-fit:cover; }
.msg-content { display:flex; flex-direction:column; }
.msg-name { font-size:12px; color:var(--text-sub); margin-bottom:4px; padding:0 4px; }
.msg-row.right .msg-name { text-align:right; }
.msg-tag { display:inline-block; font-size:10px; background:var(--green); color:#fff; padding:0 4px; border-radius:2px; margin-right:4px; vertical-align:middle; }
.msg-bubble { padding:10px 14px; border-radius:4px; font-size:16px; line-height:1.5; word-break:break-word; position:relative; max-width:100%; }
.msg-row.right .msg-bubble { background:var(--chat-right); color:#000; }
.msg-row.left .msg-bubble { background:var(--chat-left); }
.msg-row.right .msg-bubble::after { content:''; position:absolute; top:12px; right:-6px; border:6px solid transparent; border-left-color:var(--chat-right); }
.msg-row.left .msg-bubble::after { content:''; position:absolute; top:12px; left:-6px; border:6px solid transparent; border-right-color:var(--chat-left); }
.msg-time { font-size:11px; color:var(--text-light); margin-top:4px; padding:0 4px; }
.msg-row.right .msg-time { text-align:right; }

/* Reply quote */
.msg-reply { font-size:12px; color:var(--text-sub); background:rgba(0,0,0,.05); padding:4px 8px; border-radius:3px; margin-bottom:6px; border-left:3px solid var(--green); max-width:100%; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.dark .msg-reply { background:rgba(255,255,255,.05); }

/* Forward */
.msg-forward { font-size:11px; color:var(--text-sub); margin-bottom:4px; }

/* Reactions */
.msg-reactions { display:flex; gap:4px; margin-top:4px; flex-wrap:wrap; }
.reaction { font-size:14px; background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:2px 6px; cursor:pointer; }
.reaction.mine { border-color:var(--green); background:rgba(7,193,96,.1); }

/* System message */
.msg-system { text-align:center; margin:12px 0; }
.msg-system span { font-size:12px; color:var(--text-sub); background:var(--bg-dark); padding:4px 12px; border-radius:4px; }

/* Red envelope */
.msg-red-envelope { background:linear-gradient(135deg,#FA9D3B,#E8652B); color:#fff; padding:12px 16px; border-radius:8px; cursor:pointer; min-width:200px; }
.msg-red-envelope .re-title { font-size:14px; font-weight:500; margin-bottom:4px; }
.msg-red-envelope .re-greeting { font-size:12px; opacity:.8; }
.msg-red-envelope .re-icon { float:right; font-size:28px; margin-left:12px; }

/* Voice */
.voice-bubble { display:flex; align-items:center; gap:8px; min-width:100px; cursor:pointer; }
.voice-wave { display:flex; align-items:center; gap:2px; height:18px; }
.voice-wave span { width:3px; border-radius:2px; background:currentColor; }
.voice-wave span:nth-child(1){height:6px} .voice-wave span:nth-child(2){height:12px} .voice-wave span:nth-child(3){height:8px} .voice-wave span:nth-child(4){height:14px} .voice-wave span:nth-child(5){height:6px}
.voice-playing .voice-wave span { animation:wave 1s ease-in-out infinite; }
.voice-playing .voice-wave span:nth-child(2){animation-delay:.1s} .voice-playing .voice-wave span:nth-child(3){animation-delay:.2s}
.voice-playing .voice-wave span:nth-child(4){animation-delay:.3s} .voice-playing .voice-wave span:nth-child(5){animation-delay:.4s}
@keyframes wave { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(.3)} }

/* Image */
.msg-img { max-width:200px; max-height:200px; border-radius:4px; cursor:pointer; display:block; }

/* File */
.msg-file { display:flex; align-items:center; gap:12px; padding:4px 0; }
.msg-file .file-icon { font-size:32px; }
.msg-file .file-info .file-name { font-size:14px; font-weight:500; }
.msg-file .file-info .file-size { font-size:12px; color:var(--text-sub); }

/* Typing */
.typing-dots { display:flex; gap:4px; padding:10px 14px; }
.typing-dots span { width:8px; height:8px; background:#999; border-radius:50%; animation:typing 1.4s infinite; }
.typing-dots span:nth-child(2){animation-delay:.2s} .typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes typing { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

/* ===== Input Area ===== */
.input-area { background:var(--input-bg); border-top:0.5px solid var(--border); padding:8px 12px; padding-bottom:calc(8px + var(--safe-bottom)); display:flex; align-items:flex-end; gap:8px; }
.input-area .tool-btn { background:none; border:none; font-size:24px; cursor:pointer; padding:4px; flex-shrink:0; line-height:1; color:var(--text); }
.input-area textarea { flex:1; padding:10px 14px; border:0.5px solid var(--border); border-radius:6px; background:var(--card); font-size:16px; resize:none; outline:none; max-height:120px; min-height:40px; line-height:1.4; color:var(--text); }
.input-area textarea:focus { border-color:var(--green); }
.send-btn { padding:10px 16px; background:var(--green); color:#fff; border:none; border-radius:6px; font-size:15px; cursor:pointer; flex-shrink:0; }
.send-btn:active { background:var(--green-dark); }
.send-btn:disabled { background:#C0C0C0; }

.record-btn { width:100%; padding:12px; border:2px solid var(--green); border-radius:30px; background:var(--card); color:var(--green); font-size:16px; cursor:pointer; flex:1; text-align:center; }
.record-btn.recording { background:var(--green); color:#fff; animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(7,193,96,.3)} 50%{box-shadow:0 0 0 10px rgba(7,193,96,0)} }

/* Emoji */
.emoji-panel { display:none; background:var(--card); border-top:0.5px solid var(--border); padding:12px; max-height:200px; overflow-y:auto; flex-wrap:wrap; gap:2px; }
.emoji-panel.show { display:flex; }
.emoji-item { width:36px; height:36px; display:flex; align-items:center; justify-content:center; font-size:22px; cursor:pointer; border-radius:4px; }
.emoji-item:active { background:var(--bg); }

/* ===== Contact List ===== */
.section-title { padding:8px 16px; font-size:13px; color:var(--text-sub); background:var(--bg); position:sticky; top:0; z-index:1; }
.contact-item { display:flex; align-items:center; padding:12px 16px; background:var(--card); border-bottom:0.5px solid var(--border); cursor:pointer; }
.contact-item:active { background:var(--card-hover); }
.contact-av { width:40px; height:40px; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; background:var(--bg-dark); overflow:hidden; }
.contact-av img { width:100%; height:100%; object-fit:cover; }
.contact-name { margin-left:12px; font-size:17px; flex:1; }
.contact-badge { font-size:10px; background:var(--green); color:#fff; padding:1px 6px; border-radius:3px; margin-left:8px; }
.contact-sig { font-size:13px; color:var(--text-sub); margin-left:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* ===== Profile ===== */
.profile-hd { background:linear-gradient(135deg,#4A90D9,#357ABD); padding:60px 20px 30px; display:flex; align-items:center; gap:16px; }
.profile-av { width:64px; height:64px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:36px; background:rgba(255,255,255,.2); overflow:hidden; }
.profile-av img { width:100%; height:100%; object-fit:cover; }
.profile-info h2 { color:#fff; font-size:20px; font-weight:600; margin-bottom:4px; }
.profile-info p { color:rgba(255,255,255,.7); font-size:14px; }
.profile-section { margin-top:10px; }
.profile-row { display:flex; align-items:center; padding:14px 20px; background:var(--card); border-bottom:0.5px solid var(--border); cursor:pointer; }
.profile-row:active { background:var(--card-hover); }
.profile-row .icon { font-size:20px; margin-right:12px; }
.profile-row .label { flex:1; font-size:17px; }
.profile-row .arrow { color:var(--text-light); font-size:16px; }
.profile-row .value { color:var(--text-sub); font-size:14px; margin-right:8px; }
.logout-btn { display:block; margin:20px auto; padding:12px 40px; background:none; border:1px solid var(--danger); color:var(--danger); border-radius:6px; font-size:16px; cursor:pointer; }

/* ===== Moments ===== */
.moments-page { background:var(--bg); }
.moment-item { background:var(--card); margin-bottom:10px; padding:16px; }
.moment-header { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.moment-av { width:44px; height:44px; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:24px; background:var(--bg-dark); overflow:hidden; cursor:pointer; }
.moment-av img { width:100%; height:100%; object-fit:cover; }
.moment-name { font-size:16px; font-weight:500; color:var(--link); }
.moment-text { font-size:15px; line-height:1.6; margin-bottom:12px; }
.moment-images { display:grid; gap:4px; margin-bottom:12px; }
.moment-images.g1 { grid-template-columns:1fr; max-width:250px; }
.moment-images.g2,.moment-images.g3 { grid-template-columns:repeat(3,1fr); max-width:300px; }
.moment-images.g4,.moment-images.g5,.moment-images.g6 { grid-template-columns:repeat(3,1fr); max-width:300px; }
.moment-images img { width:100%; aspect-ratio:1; object-fit:cover; border-radius:4px; cursor:pointer; }
.moment-actions { display:flex; justify-content:space-between; align-items:center; margin-top:8px; }
.moment-time { font-size:12px; color:var(--text-sub); }
.moment-btns { display:flex; gap:16px; }
.moment-btns button { background:none; border:none; font-size:13px; color:var(--link); cursor:pointer; padding:4px; }
.moment-likes { font-size:13px; color:var(--link); padding:4px 0; border-bottom:1px solid var(--border); margin-bottom:8px; }
.moment-comment { font-size:14px; padding:4px 0; }
.moment-comment .name { color:var(--link); margin-right:4px; }

/* Compose moment */
.compose-bar { display:flex; align-items:center; gap:12px; padding:16px; background:var(--card); margin-bottom:10px; }
.compose-bar input { flex:1; padding:10px 14px; border:1px solid var(--border); border-radius:20px; background:var(--bg); font-size:15px; outline:none; color:var(--text); }

/* ===== Search ===== */
.search-bar { display:flex; align-items:center; gap:8px; padding:8px 16px; background:var(--bg); }
.search-bar input { flex:1; padding:8px 12px; border:none; border-radius:6px; background:var(--card); font-size:15px; outline:none; color:var(--text); }
.search-bar .cancel { background:none; border:none; color:var(--link); font-size:15px; cursor:pointer; }

/* ===== Modals ===== */
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; display:none; align-items:flex-end; justify-content:center; }
.modal-bg.show { display:flex; }
.modal-box { background:var(--modal-bg); border-radius:12px 12px 0 0; width:100%; max-width:500px; max-height:85vh; overflow-y:auto; padding:20px; }
.modal-box h3 { font-size:18px; font-weight:600; text-align:center; margin-bottom:20px; }
.modal-box input,.modal-box textarea { width:100%; padding:14px; border:0.5px solid var(--border); border-radius:6px; font-size:16px; margin-bottom:12px; outline:none; background:var(--bg); color:var(--text); }
.modal-box input:focus,.modal-box textarea:focus { border-color:var(--green); background:var(--card); }
.modal-btn { width:100%; padding:14px; border:none; border-radius:6px; font-size:16px; cursor:pointer; margin-bottom:8px; }
.modal-btn-ok { background:var(--green); color:#fff; }
.modal-btn-cancel { background:var(--bg); color:var(--text); }

/* ===== Context Menu ===== */
.ctx-menu { position:fixed; background:var(--card); border-radius:8px; box-shadow:var(--shadow),0 4px 12px rgba(0,0,0,.15); z-index:200; overflow:hidden; min-width:120px; }
.ctx-item { padding:12px 16px; font-size:15px; cursor:pointer; border-bottom:0.5px solid var(--border); display:flex; align-items:center; gap:8px; }
.ctx-item:last-child { border-bottom:none; }
.ctx-item:active { background:var(--card-hover); }

/* ===== Toast ===== */
.toast { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); padding:12px 24px; background:rgba(0,0,0,.75); color:#fff; border-radius:8px; font-size:14px; z-index:999; animation:toastIn .3s ease-out; }
@keyframes toastIn { from{opacity:0;transform:translate(-50%,-50%) scale(.9)} to{opacity:1;transform:translate(-50%,-50%) scale(1)} }

/* ===== Empty State ===== */
.empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--text-sub); gap:12px; }
.empty .icon { font-size:48px; }
.empty p { font-size:14px; }

/* ===== Search Page ===== */
.search-page { background:var(--bg); }
.search-results { flex:1; overflow-y:auto; }
.search-group { margin-bottom:8px; }
.search-group-title { padding:8px 16px; font-size:13px; color:var(--text-sub); font-weight:500; }
.search-item { display:flex; align-items:center; padding:12px 16px; background:var(--card); border-bottom:0.5px solid var(--border); cursor:pointer; }
.search-item:active { background:var(--card-hover); }

/* ===== Member List (in modal) ===== */
.member-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:16px; padding:12px 0; }
.member-item { display:flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer; }
.member-item .av { width:48px; height:48px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:24px; background:var(--bg-dark); overflow:hidden; }
.member-item .av img { width:100%; height:100%; object-fit:cover; }
.member-item .nm { font-size:12px; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:60px; }

/* ===== Notification dot on tab ===== */
.has-new::after { content:''; position:absolute; top:2px; right:calc(50% - 16px); width:8px; height:8px; background:var(--danger); border-radius:50%; }

/* ===== Forward modal list ===== */
.forward-list { max-height:300px; overflow-y:auto; }
.forward-item { display:flex; align-items:center; padding:12px 0; border-bottom:0.5px solid var(--border); cursor:pointer; }
.forward-item:active { background:var(--card-hover); }
.forward-item .av { width:36px; height:36px; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:20px; background:var(--bg-dark); margin-right:12px; }
.forward-item .nm { font-size:16px; }

/* ===== Settings sub-pages ===== */
.settings-row { display:flex; align-items:center; padding:14px 20px; background:var(--card); border-bottom:0.5px solid var(--border); }
.settings-row .label { flex:1; font-size:17px; }
.settings-row .desc { font-size:14px; color:var(--text-sub); }
.toggle { width:44px; height:24px; border-radius:12px; background:var(--text-light); position:relative; cursor:pointer; transition:background .2s; }
.toggle.on { background:var(--green); }
.toggle::after { content:''; position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%; background:#fff; transition:transform .2s; }
.toggle.on::after { transform:translateX(20px); }
</style>
</head>
<body>
<div id="app">

<!-- ===== Login Page ===== -->
<div id="loginPage" class="page login-page active">
  <div class="login-hero">
    <div class="logo">🏠</div>
    <h1>FamilyChat</h1>
    <p>家庭数字人聊天</p>
  </div>
  <div class="login-form">
    <div id="loginError" class="error"></div>
    <div id="extraFields" class="extra">
      <div class="field"><input id="regNick" placeholder="你的昵称"></div>
      <div class="field"><input id="regRole" placeholder="家庭角色（爸爸/妈妈/儿子...）"></div>
    </div>
    <div class="field"><input id="loginEmail" type="email" placeholder="邮箱"></div>
    <div class="field"><input id="loginPass" type="password" placeholder="密码"></div>
    <button class="login-btn" id="loginBtn">登录</button>
    <div class="login-switch" id="loginSwitch">注册新账号</div>
  </div>
</div>

<!-- ===== Main Page ===== -->
<div id="mainPage" class="page main-page">
  <div class="main-header">
    <h1>微信</h1>
    <div class="actions">
      <button onclick="showPage('searchPage')" title="搜索">🔍</button>
      <button onclick="showModal('createGroupModal')" title="发起群聊">＋</button>
    </div>
  </div>
  <div style="flex:1;overflow:hidden;position:relative;">
    <div id="panelChat" class="tab-panel active"></div>
    <div id="panelContact" class="tab-panel"></div>
    <div id="panelProfile" class="tab-panel"></div>
  </div>
  <div class="tab-bar">
    <button class="tab-item active" onclick="switchTab('Chat',this)"><span class="icon">💬</span><span>微信</span></button>
    <button class="tab-item" onclick="switchTab('Contact',this)" id="tabContact"><span class="icon">👥</span><span>通讯录</span></button>
    <button class="tab-item" onclick="switchTab('Profile',this)"><span class="icon">👤</span><span>我</span></button>
  </div>
</div>

<!-- ===== Chat Page ===== -->
<div id="chatPage" class="page" style="background:var(--bg);">
  <div class="header">
    <button class="back" onclick="goBack()">‹</button>
    <div class="header-title" id="chatTitle">-</div>
    <button class="action" onclick="showGroupInfo()">⋯</button>
  </div>
  <div class="msgs" id="msgList"></div>
  <div class="emoji-panel" id="emojiPanel"></div>
  <div class="input-area" id="inputArea">
    <button class="tool-btn" onclick="toggleEmoji()">😊</button>
    <button class="tool-btn" onclick="$('imgFile').click()">📷</button>
    <input type="file" id="imgFile" accept="image/*" style="display:none" onchange="sendImage(this)">
    <button class="tool-btn" onclick="$('fileInput').click()">📎</button>
    <input type="file" id="fileInput" style="display:none" onchange="sendFile(this)">
    <button class="tool-btn" id="voiceToggle" onclick="toggleVoice()">🎤</button>
    <textarea id="msgInput" rows="1" placeholder="消息" oninput="autoGrow(this);sendTyping()" onkeydown="onKey(event)"></textarea>
    <button class="record-btn" id="recordBtn" style="display:none" onmousedown="recStart()" onmouseup="recStop()" ontouchstart="recStart()" ontouchend="recStop()">按住 说话</button>
    <button class="send-btn" id="sendBtn" onclick="sendText()">发送</button>
  </div>
</div>

<!-- ===== Moments Page ===== -->
<div id="momentsPage" class="page moments-page">
  <div class="header">
    <button class="back" onclick="goBack()">‹</button>
    <div class="header-title">朋友圈</div>
    <button class="action" onclick="showModal('composeMomentModal')">📷</button>
  </div>
  <div id="momentsList" style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;"></div>
</div>

<!-- ===== Search Page ===== -->
<div id="searchPage" class="page search-page">
  <div class="search-bar">
    <input id="searchInput" placeholder="搜索" oninput="doSearch(this.value)">
    <button class="cancel" onclick="goBack()">取消</button>
  </div>
  <div id="searchResults" class="search-results"></div>
</div>

<!-- ===== Favorites Page ===== -->
<div id="favoritesPage" class="page">
  <div class="header">
    <button class="back" onclick="goBack()">‹</button>
    <div class="header-title">收藏</div>
  </div>
  <div id="favoritesList" style="flex:1;overflow-y:auto;"></div>
</div>

<!-- ===== Settings Page ===== -->
<div id="settingsPage" class="page">
  <div class="header">
    <button class="back" onclick="goBack()">‹</button>
    <div class="header-title">设置</div>
  </div>
  <div style="flex:1;overflow-y:auto;">
    <div class="settings-row">
      <span class="label">深色模式</span>
      <div class="toggle" id="darkToggle" onclick="toggleDark()"></div>
    </div>
    <div class="settings-row" onclick="showModal('llmConfigModal')" style="cursor:pointer">
      <span class="label">🤖 AI 模型配置</span>
      <span class="arrow" style="color:var(--text-light)">›</span>
    </div>
    <div class="settings-row" onclick="loadFavorites();showPage('favoritesPage')" style="cursor:pointer">
      <span class="label">⭐ 我的收藏</span>
      <span class="arrow" style="color:var(--text-light)">›</span>
    </div>
    <div class="settings-row" onclick="showModal('refineModal')" style="cursor:pointer">
      <span class="label">🧪 炼化数字人</span>
      <span class="arrow" style="color:var(--text-light)">›</span>
    </div>
    <div class="settings-row" onclick="showModal('editProfileModal')" style="cursor:pointer">
      <span class="label">👤 编辑资料</span>
      <span class="arrow" style="color:var(--text-light)">›</span>
    </div>
    <div class="settings-row" onclick="loadStats()" style="cursor:pointer">
      <span class="label">📊 系统统计</span>
      <span class="arrow" style="color:var(--text-light)">›</span>
    </div>
    <div class="settings-row" onclick="createBackup()" style="cursor:pointer">
      <span class="label">💾 创建备份</span>
      <span class="arrow" style="color:var(--text-light)">›</span>
    </div>
    <div class="settings-row">
      <span class="label">版本</span>
      <span class="desc">v2.0.0</span>
    </div>
    <button class="logout-btn" onclick="doLogout()" style="margin-top:40px">退出登录</button>
  </div>
</div>

</div><!-- end #app -->

<!-- ===== Modals ===== -->

<!-- Create Group -->
<div id="createGroupModal" class="modal-bg" onclick="if(event.target===this)closeModal(this)">
  <div class="modal-box">
    <h3>发起群聊</h3>
    <input id="newGroupName" placeholder="群名称">
    <input id="newGroupDesc" placeholder="群描述（可选）">
    <button class="modal-btn modal-btn-ok" onclick="doCreateGroup()">确定</button>
    <button class="modal-btn modal-btn-cancel" onclick="closeModal($('createGroupModal'))">取消</button>
  </div>
</div>

<!-- Members -->
<div id="membersModal" class="modal-bg" onclick="if(event.target===this)closeModal(this)">
  <div class="modal-box">
    <h3 id="membersTitle">群成员</h3>
    <div id="memberList"></div>
    <button class="modal-btn modal-btn-cancel" style="margin-top:16px" onclick="closeModal($('membersModal'))">关闭</button>
  </div>
</div>

<!-- Refine -->
<div id="refineModal" class="modal-bg" onclick="if(event.target===this)closeModal(this)">
  <div class="modal-box">
    <h3>🧪 炼化数字人</h3>
    <p style="color:var(--text-sub);font-size:13px;margin-bottom:16px;text-align:center">输入聊天记录或自我介绍，AI 提取性格特征</p>
    <select id="refineAgentSelect" style="width:100%;padding:12px;border:0.5px solid var(--border);border-radius:6px;font-size:16px;margin-bottom:12px;background:var(--card);color:var(--text);"></select>
    <textarea id="refineText" rows="6" placeholder="粘贴聊天记录或自我介绍..."></textarea>
    <button class="modal-btn modal-btn-ok" onclick="doRefine()">开始炼化</button>
    <button class="modal-btn modal-btn-cancel" onclick="closeModal($('refineModal'))">取消</button>
  </div>
</div>

<!-- Forward -->
<div id="forwardModal" class="modal-bg" onclick="if(event.target===this)closeModal(this)">
  <div class="modal-box">
    <h3>转发给</h3>
    <div id="forwardList" class="forward-list"></div>
    <button class="modal-btn modal-btn-cancel" style="margin-top:16px" onclick="closeModal($('forwardModal'))">取消</button>
  </div>
</div>

<!-- Red Envelope -->
<div id="redEnvelopeModal" class="modal-bg" onclick="if(event.target===this)closeModal(this)">
  <div class="modal-box">
    <h3>🧧 发红包</h3>
    <input id="reAmount" type="number" placeholder="金额（元）" min="0.01" max="200" step="0.01">
    <input id="reGreeting" placeholder="祝福语" value="恭喜发财">
    <input id="reCount" type="number" placeholder="红包个数" value="1" min="1">
    <button class="modal-btn modal-btn-ok" onclick="doSendRedEnvelope()">塞钱进红包</button>
    <button class="modal-btn modal-btn-cancel" onclick="closeModal($('redEnvelopeModal'))">取消</button>
  </div>
</div>

<!-- Red Envelope Detail -->
<div id="redEnvelopeDetail" class="modal-bg" onclick="if(event.target===this)closeModal(this)">
  <div class="modal-box" id="redEnvelopeContent"></div>
</div>

<!-- Compose Moment -->
<div id="composeMomentModal" class="modal-bg" onclick="if(event.target===this)closeModal(this)">
  <div class="modal-box">
    <h3>发朋友圈</h3>
    <textarea id="momentText" rows="4" placeholder="分享新鲜事..."></textarea>
    <div id="momentImgs" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;"></div>
    <button class="modal-btn" style="background:var(--bg);color:var(--text);margin-bottom:12px" onclick="$('momentImgInput').click()">📷 添加图片</button>
    <input type="file" id="momentImgInput" accept="image/*" multiple style="display:none" onchange="previewMomentImgs(this)">
    <button class="modal-btn modal-btn-ok" onclick="doPublishMoment()">发表</button>
    <button class="modal-btn modal-btn-cancel" onclick="closeModal($('composeMomentModal'))">取消</button>
  </div>
</div>

<!-- LLM Config -->
<div id="llmConfigModal" class="modal-bg" onclick="if(event.target===this)closeModal(this)">
  <div class="modal-box">
    <h3>🤖 AI 模型配置</h3>
    <select id="llmProvider" style="width:100%;padding:12px;border:0.5px solid var(--border);border-radius:6px;font-size:16px;margin-bottom:12px;background:var(--card);color:var(--text);">
      <option value="deepseek">DeepSeek</option>
      <option value="openai">OpenAI</option>
      <option value="zhipu">智谱AI</option>
      <option value="qwen">通义千问</option>
      <option value="local">本地模型</option>
    </select>
    <input id="llmApiKey" type="password" placeholder="API Key">
    <input id="llmModel" placeholder="模型名称（如 deepseek-chat）">
    <input id="llmBaseUrl" placeholder="Base URL（可选，留空用默认）">
    <button class="modal-btn modal-btn-ok" onclick="doSaveLLMConfig()">保存</button>
    <button class="modal-btn modal-btn-cancel" onclick="closeModal($('llmConfigModal'))">取消</button>
  </div>
</div>

<!-- Pinned Messages -->
<div id="pinnedModal" class="modal-bg" onclick="if(event.target===this)closeModal(this)">
  <div class="modal-box">
    <h3>📌 置顶消息</h3>
    <div id="pinnedList"></div>
    <button class="modal-btn modal-btn-cancel" style="margin-top:16px" onclick="closeModal($('pinnedModal'))">关闭</button>
  </div>
</div>

<!-- Edit Profile -->
<div id="editProfileModal" class="modal-bg" onclick="if(event.target===this)closeModal(this)">
  <div class="modal-box">
    <h3>👤 编辑资料</h3>
    <input id="editNick" placeholder="昵称">
    <input id="editSignature" placeholder="签名">
    <select id="editGender" style="width:100%;padding:14px;border:0.5px solid var(--border);border-radius:6px;font-size:16px;margin-bottom:12px;background:var(--card);color:var(--text);">
      <option value="">性别</option>
      <option value="male">男</option>
      <option value="female">女</option>
    </select>
    <input id="editRegion" placeholder="地区">
    <button class="modal-btn modal-btn-ok" onclick="doEditProfile()">保存</button>
    <button class="modal-btn modal-btn-cancel" onclick="closeModal($('editProfileModal'))">取消</button>
  </div>
</div>

<!-- Stats -->
<div id="statsModal" class="modal-bg" onclick="if(event.target===this)closeModal(this)">
  <div class="modal-box">
    <h3>📊 系统统计</h3>
    <div id="statsContent"></div>
    <button class="modal-btn modal-btn-cancel" style="margin-top:16px" onclick="closeModal($('statsModal'))">关闭</button>
  </div>
</div>

<script>
// ==================== State ====================
const S = {
  token: localStorage.getItem('fc_token') || '',
  user: JSON.parse(localStorage.getItem('fc_user') || 'null'),
  groups: [], agents: [], friends: [],
  curGroup: null, curGroupName: '',
  ws: null, isReg: false, voiceMode: false,
  dark: localStorage.getItem('fc_dark') === 'true',
  replyTo: null,
  momentImgs: [],
  searchTimer: null,
};

const $ = id => document.getElementById(id);

// ==================== Init Dark Mode ====================
if (S.dark) document.documentElement.classList.add('dark');

// ==================== API ====================
async function api(path, opts={}) {
  const h = {'Content-Type':'application/json'};
  if (S.token) h['Authorization'] = `Bearer ${S.token}`;
  const r = await fetch(path, {...opts, headers:{...h,...opts.headers}});
  if (r.status===401) { doLogout(); throw new Error('未登录'); }
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.detail||'请求失败'); }
  return r.json();
}

function toast(msg) {
  const d = document.createElement('div');
  d.className = 'toast'; d.textContent = msg;
  document.body.appendChild(d);
  setTimeout(()=>d.remove(), 2000);
}

// ==================== Page Navigation ====================
let pageStack = ['loginPage'];
function showPage(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  $(id).classList.add('active');
  if (!pageStack.includes(id)) pageStack.push(id);
}
function goBack() {
  pageStack.pop();
  const prev = pageStack[pageStack.length-1] || 'mainPage';
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  $(prev).classList.add('active');
  if (prev === 'mainPage') { S.curGroup = null; loadGroups(); }
}
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(b=>b.classList.remove('active'));
  $('panel'+name).classList.add('active');
  btn.classList.add('active');
  if (name==='Contact') loadContacts();
  if (name==='Profile') renderProfile();
}
function showModal(id) { $(id).classList.add('show'); }
function closeModal(el) { el.classList.remove('show'); }

// ==================== Dark Mode ====================
function toggleDark() {
  S.dark = !S.dark;
  document.documentElement.classList.toggle('dark', S.dark);
  localStorage.setItem('fc_dark', S.dark);
  $('darkToggle').classList.toggle('on', S.dark);
}

// ==================== Auth ====================
$('loginSwitch').onclick = () => {
  S.isReg = !S.isReg;
  $('extraFields').classList.toggle('show', S.isReg);
  $('loginBtn').textContent = S.isReg ? '注册' : '登录';
  $('loginSwitch').textContent = S.isReg ? '已有账号？登录' : '注册新账号';
};

$('loginBtn').onclick = async () => {
  const email = $('loginEmail').value.trim();
  const pass = $('loginPass').value.trim();
  if (!email||!pass) return showErr('请填写邮箱和密码');
  if (S.isReg && !$('regNick').value.trim()) return showErr('请填写昵称');
  try {
    const ep = S.isReg ? '/api/register' : '/api/login';
    const body = S.isReg
      ? {email, username:email.split('@')[0], password:pass, nickname:$('regNick').value.trim(), role_in_family:$('regRole').value.trim()}
      : {email, password:pass};
    const d = await api(ep, {method:'POST', body:JSON.stringify(body)});
    S.token = d.token; S.user = d.user;
    localStorage.setItem('fc_token', d.token);
    localStorage.setItem('fc_user', JSON.stringify(d.user));
    enterApp();
  } catch(e) { showErr(e.message); }
};
function showErr(m) { const e=$('loginError'); e.textContent=m; e.style.display='block'; setTimeout(()=>e.style.display='none',3000); }
function doLogout() { S.token=''; S.user=null; localStorage.removeItem('fc_token'); localStorage.removeItem('fc_user'); if(S.ws)S.ws.close(); pageStack=['loginPage']; showPage('loginPage'); }

// ==================== Enter App ====================
async function enterApp() {
  pageStack = ['mainPage'];
  showPage('mainPage');
  await Promise.all([loadGroups(), loadAgents(), loadFriends()]);
  connectWS();
  renderProfile();
  $('darkToggle').classList.toggle('on', S.dark);
}

// ==================== Groups ====================
async function loadGroups() {
  try { S.groups = await api('/api/groups'); } catch(e) { console.error(e); }
  renderGroups();
}
function renderGroups() {
  const el = $('panelChat');
  if (!S.groups.length) {
    el.innerHTML = '<div class="empty"><span class="icon">💬</span><p>暂无聊天</p></div>';
    return;
  }
  el.innerHTML = S.groups.map(g => {
    const av = g.avatar || '👥';
    const avatarHtml = av.startsWith('/') ? `<img src="${av}">` : av;
    return `<div class="chat-item" onclick="openChat('${g.id}','${esc(g.name)}','${esc(av)}')">
      <div class="chat-avatar">${avatarHtml}</div>
      <div class="chat-body"><div class="name">${esc(g.name)}</div><div class="preview">${esc(g.last_message||'')}</div></div>
      <div class="chat-meta"><div class="time">${fmtTime(g.last_time)}</div></div>
    </div>`;
  }).join('');
}
async function doCreateGroup() {
  const name = $('newGroupName').value.trim();
  if (!name) return;
  try {
    await api('/api/groups', {method:'POST', body:JSON.stringify({name, description:$('newGroupDesc').value})});
    closeModal($('createGroupModal'));
    $('newGroupName').value=''; $('newGroupDesc').value='';
    await loadGroups();
    toast('群聊已创建');
  } catch(e) { toast(e.message); }
}

// ==================== Contacts ====================
async function loadContacts() {
  let html = '<div class="section-title">数字人</div>';
  for (const a of S.agents) {
    html += `<div class="contact-item" onclick="showAgentDetail('${a.id}')">
      <div class="contact-av">${a.avatar||'🤖'}</div>
      <div class="contact-name">${esc(a.name)}</div>
      <span class="contact-badge">AI</span>
    </div>`;
  }
  // Friends
  if (S.friends.length) {
    html += '<div class="section-title">好友</div>';
    for (const f of S.friends) {
      const avHtml = f.avatar_url ? `<img src="${f.avatar_url}">` : (f.avatar||'😀');
      const online = f.online_status === 'online' ? '🟢' : '';
      html += `<div class="contact-item">
        <div class="contact-av">${avHtml}</div>
        <div class="contact-name">${esc(f.remark||f.nickname)} ${online}</div>
      </div>`;
    }
  }
  // Friend requests
  try {
    const reqs = await api('/api/friends/requests');
    if (reqs.length) {
      html += `<div class="section-title">新的好友请求 (${reqs.length})</div>`;
      for (const r of reqs) {
        html += `<div class="contact-item">
          <div class="contact-av">${r.avatar||'😀'}</div>
          <div style="flex:1;margin-left:12px">
            <div class="contact-name" style="margin-left:0">${esc(r.nickname)}</div>
            <div style="font-size:13px;color:var(--text-sub)">${esc(r.message||'请求加你为好友')}</div>
          </div>
          <button style="background:var(--green);color:#fff;border:none;padding:6px 16px;border-radius:4px;font-size:14px;cursor:pointer" onclick="handleFriendRequest('${r.id}','accept')">接受</button>
        </div>`;
      }
    }
  } catch(e) {}

  if (S.curGroup) {
    try {
      const ms = await api(`/api/groups/${S.curGroup}/members`);
      html += '<div class="section-title">群成员</div>';
      ms.forEach(m => {
        const avHtml = m.avatar_url ? `<img src="${m.avatar_url}">` : m.avatar;
        html += `<div class="contact-item">
          <div class="contact-av">${avHtml}</div>
          <div class="contact-name">${esc(m.name)}${m.is_agent?'<span class="contact-badge">AI</span>':''}</div>
          <div style="font-size:12px;color:var(--text-sub)">${esc(m.signature||'')}</div>
        </div>`;
      });
    } catch(e) {}
  }
  $('panelContact').innerHTML = html;
}
async function handleFriendRequest(rid, action) {
  try {
    await api('/api/friends/requests/handle', {method:'POST', body:JSON.stringify({request_id:rid, action})});
    toast(action==='accept' ? '已添加好友' : '已拒绝');
    await loadFriends();
    loadContacts();
  } catch(e) { toast(e.message); }
}

// ==================== Friends ====================
async function loadFriends() {
  try { S.friends = await api('/api/friends'); } catch(e) {}
}

// ==================== Profile ====================
function renderProfile() {
  const u = S.user||{};
  const avHtml = u.avatar_url ? `<img src="${u.avatar_url}">` : (u.avatar||'😀');
  $('panelProfile').innerHTML = `
    <div class="profile-hd">
      <div class="profile-av">${avHtml}</div>
      <div class="profile-info"><h2>${esc(u.nickname||u.username||'-')}</h2><p>${esc(u.signature||u.email||'')}</p></div>
    </div>
    <div class="profile-section">
      <div class="profile-row" onclick="loadMoments();showPage('momentsPage')"><span class="icon">📷</span><span class="label">朋友圈</span><span class="arrow">›</span></div>
      <div class="profile-row" onclick="showModal('refineModal')"><span class="icon">🧪</span><span class="label">炼化数字人</span><span class="arrow">›</span></div>
      <div class="profile-row" onclick="loadFavorites();showPage('favoritesPage')"><span class="icon">⭐</span><span class="label">收藏</span><span class="arrow">›</span></div>
      <div class="profile-row" onclick="showPage('settingsPage')"><span class="icon">⚙️</span><span class="label">设置</span><span class="arrow">›</span></div>
    </div>`;
}

// ==================== Agents ====================
async function loadAgents() {
  try { S.agents = await api('/api/agents'); } catch(e) {}
  // Populate refine select
  const sel = $('refineAgentSelect');
  if (sel) {

  const el = $('msgList');
  if (!msgs.length) { el.innerHTML = '<div class="empty"><span class="icon">💬</span><p>说点什么吧</p></div>'; return; }
  el.innerHTML = msgs.map(m => buildMsg(m)).join('');
  el.scrollTop = el.scrollHeight;
}

function buildMsg(m) {
  if (m.msg_type === 'system') return `<div class="msg-system"><span>${esc(m.content)}</span></div>`;

  const isMe = m.sender_id === S.user?.id;
  const side = isMe ? 'right' : 'left';
  const av = m.is_agent ? (m.agent_avatar||'🤖') : (m.sender_avatar||'😀');
  const avHtml = (m.sender_avatar_url||'').startsWith('/') ? `<img src="${m.sender_avatar_url}">` : av;
  const tag = m.is_agent ? '<span class="msg-tag">AI</span>' : '';

  // Reply quote
  let replyHtml = '';
  if (m.reply_to && m.reply_content) {
    replyHtml = `<div class="msg-reply" onclick="scrollToMsg('${m.reply_to}')">↩ ${esc(m.reply_content)}</div>`;
  }

  // Forward
  let forwardHtml = '';
  if (m.forwarded_from) {
    forwardHtml = `<div class="msg-forward">↪ 转发: ${esc(m.forwarded_from)}</div>`;
  }

  // Bubble content
  let bubble = '';
  if (m.msg_type === 'voice' && m.media_url) {
    bubble = `<div class="voice-bubble" onclick="playVoice(this,'${m.media_url}')"><span>🔊</span><div class="voice-wave"><span></span><span></span><span></span><span></span><span></span></div><span style="font-size:12px;color:var(--text-sub)">语音</span></div>`;
  } else if (m.msg_type === 'image') {
    bubble = `<img class="msg-img" src="${m.media_url||m.content}" onclick="window.open(this.src)" onerror="this.style.display='none'">`;
  } else if (m.msg_type === 'file') {
    const sz = m.file_size > 1048576 ? (m.file_size/1048576).toFixed(1)+'MB' : (m.file_size/1024).toFixed(0)+'KB';
    bubble = `<div class="msg-file"><span class="file-icon">📄</span><div class="file-info"><div class="file-name">${esc(m.file_name||'文件')}</div><div class="file-size">${sz}</div></div></div>`;
  } else if (m.msg_type === 'red_envelope') {
    bubble = `<div class="msg-red-envelope" onclick="openRedEnvelope('${m.id}')"><span class="re-icon">🧧</span><div class="re-title">红包</div><div class="re-greeting">${esc(m.content)}</div></div>`;
  } else {
    bubble = esc(m.content);
  }

  // Reactions
  let reactionsHtml = '';
  if (m.reactions && m.reactions.length) {
    const grouped = {};
    m.reactions.forEach(r => { grouped[r.emoji] = (grouped[r.emoji]||0) + 1; });
    reactionsHtml = '<div class="msg-reactions">' +
      Object.entries(grouped).map(([emoji, count]) =>
        `<span class="reaction" onclick="toggleReaction('${m.id}','${emoji}')">${emoji}${count>1?count:''}</span>`
      ).join('') + '</div>';
  }

  return `<div class="msg-row ${side}" id="msg-${m.id}" oncontextmenu="showMsgMenu(event,'${m.id}','${m.sender_id}','${esc(m.content)}','${m.msg_type}','${m.media_url||''}','${m.sender_name||''}')">
    <div class="msg-av" onclick="showUserInfo('${m.sender_id}')">${avHtml}</div>
    <div class="msg-content">
      <div class="msg-name">${tag}${esc(m.sender_name)}</div>
      ${forwardHtml}
      ${replyHtml}
      <div class="msg-bubble">${bubble}</div>
      ${reactionsHtml}
      <div class="msg-time">${fmtTime(m.created_at)}</div>
    </div>
  </div>`;
}

function appendMsg(m) {
  const el = $('msgList');
  const empty = el.querySelector('.empty');
  if (empty) empty.remove();
  if (m.is_agent) removeTyping(m.sender_name);
  el.insertAdjacentHTML('beforeend', buildMsg(m));
  el.scrollTop = el.scrollHeight;
}

  ctxMenuEl.style.left = Math.min(e.clientX, window.innerWidth-150) + 'px';
  ctxMenuEl.style.top = Math.min(e.clientY, window.innerHeight-200) + 'px';
  ctxMenuEl.innerHTML = items.map(i => `<div class="ctx-item" onclick="${i.action};hideCtxMenu()">${i.icon} ${i.label}</div>`).join('');
  document.body.appendChild(ctxMenuEl);
  setTimeout(() => document.addEventListener('click', hideCtxMenu, {once:true}), 10);
}

let recorder=null, chunks=[];
function toggleVoice() {
  S.voiceMode = !S.voiceMode;
  $('msgInput').style.display = S.voiceMode?'none':'block';
  $('recordBtn').style.display = S.voiceMode?'block':'none';
  $('sendBtn').style.display = S.voiceMode?'none':'block';
  $('voiceToggle').style.color = S.voiceMode?'var(--green)':'';
}
async function recStart() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    recorder = new MediaRecorder(stream, {mimeType:'audio/webm;codecs=opus'});
    chunks=[];
    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.start();
    $('recordBtn').classList.add('recording');
    $('recordBtn').textContent = '松开 结束';
  } catch(e) { toast('需要麦克风权限'); }
}
async function recStop() {
  if (!recorder||recorder.state!=='recording') return;
  $('recordBtn').classList.remove('recording');
  $('recordBtn').textContent = '按住 说话';
  recorder.stop();
  recorder.stream.getTracks().forEach(t=>t.stop());
  recorder.onstop = async () => {
    const blob = new Blob(chunks, {type:'audio/webm'});
    const form = new FormData(); form.append('file', blob, 'voice.webm');
    try {
      const r = await fetch('/api/voice/upload', {method:'POST', headers:{'Authorization':'Bearer '+S.token}, body:form});
      const d = await r.json();
      await api('/api/messages', {method:'POST', body:JSON.stringify({group_id:S.curGroup, content:'[语音消息]', msg_type:'voice', media_url:d.url})});
      appendMsg({id:Date.now(), sender_id:S.user.id, sender_name:S.user.nickname, sender_avatar:S.user.avatar, content:'[语音消息]', msg_type:'voice', media_url:d.url, is_agent:false, created_at:Date.now()/1000, reactions:[]});
    } catch(e) { toast('发送失败'); }
  };
}
function playVoice(el, url) {
  const audio = new Audio(url);
  el.classList.add('voice-playing');
  audio.play();
  audio.onended = () => el.classList.remove('voice-playing');
}

function renderMoments(moments) {
  const el = $('momentsList');
  if (!moments.length) {

  el.innerHTML = moments.map(m => {

      const cls = 'g'+Math.min(m.images.length,6);
      imgHtml = `<div class="moment-images ${cls}">${m.images.map(i=>`<img src="${i}" onclick="window.open(this.src)">`).join('')}</div>`;
    }
    let likesHtml = '';
    if (m.likes.length) {
      likesHtml = `<div class="moment-likes">❤️ ${m.likes.map(l=>esc(l.user_name)).join('、')}</div>`;
    }
    let commentsHtml = m.comments.map(c => `<div class="moment-comment"><span class="name">${esc(c.user_name)}</span>${esc(c.content)}</div>`).join('');

    const avHtml = m.avatar_url ? `<img src="${m.avatar_url}">` : m.avatar;
    return `<div class="moment-item">
      <div class="moment-header">
        <div class="moment-av">${avHtml}</div>
        <div class="moment-name">${esc(m.nickname)}</div>
      </div>
      <div class="moment-text">${esc(m.content)}</div>
      ${imgHtml}
      <div class="moment-actions">
        <div class="moment-time">${fmtTime(m.created_at)}</div>
        <div class="moment-btns">
          <button onclick="likeMoment('${m.id}')">${m.my_like?'❤️':'🤍'} ${m.like_count||''}</button>
          <button onclick="commentMoment('${m.id}')">💬 ${m.comment_count||''}</button>
        </div>
      </div>
      ${likesHtml}${commentsHtml}
    </div>`;
  }).join('');
}

        html += r.groups.map(g => `<div class="search-item" onclick="openChat('${g.id}','${esc(g.name)}','${g.avatar}')"><div class="contact-av">${g.avatar}</div><div style="margin-left:12px">${esc(g.name)}</div></div>`).join('');

        html += r.messages.map(m => `<div class="search-item" onclick="openChat('${m.group_id}','${esc(m.group_name)}','')"><div style="flex:1"><div style="font-size:15px">${esc(m.content)}</div><div style="font-size:12px;color:var(--text-sub)">${esc(m.sender_name)} · ${esc(m.group_name)} · ${fmtTime(m.created_at)}</div></div></div>`).join('');

      }
      if (!html) html = '<div class="empty" style="height:auto;padding:40px"><p>无搜索结果</p></div>';
      $('searchResults').innerHTML = html;
    } catch(e) {}
  }, 300);
}

// ==================== WebSocket ====================
function connectWS() {
  if (!S.token) return;
  const proto = location.protocol==='https:'?'wss':'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws?token=${S.token}`);
  ws.onopen = () => { S.ws=ws; };
  ws.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type==='message'&&msg.data) {
        if (msg.data.group_id===S.curGroup) {
          if (msg.data.is_agent) {
            showTyping(msg.data.sender_name);
            setTimeout(()=>{ removeTyping(msg.data.sender_name); appendMsg(msg.data); }, 1500);
          } else {
            appendMsg(msg.data);
          }
        }
        // Update group list preview
        const g = S.groups.find(g=>g.id===msg.data.group_id);
        if (g) {
          g.last_message = msg.data.msg_type==='image'?'[图片]':msg.data.msg_type==='voice'?'[语音]':msg.data.content;
          g.last_time = msg.data.created_at;
          renderGroups();
        }
      } else if (msg.type==='typing') {
        // Show typing indicator
      } else if (msg.type==='recall') {
        // Refresh messages
        if (S.curGroup) api(`/api/messages/${S.curGroup}?limit=100`).then(renderMsgs);
      } else if (msg.type==='reaction') {
        // Refresh messages
      } else if (msg.type==='pat') {
        toast(`${msg.data.from} ${msg.data.action} ${msg.data.to}`);
      } else if (msg.type==='red_envelope') {
        toast(`${msg.data.sender} 发了一个红包 🧧`);
      }
    } catch(err) {}
  };
  ws.onclose = () => setTimeout(connectWS, 3000);
}

// ==================== Utils ====================
function esc(s) { if(!s)return''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts*1000), now = new Date();
  const hm = d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
  if (d.toDateString()===now.toDateString()) return hm;
  const yesterday = new Date(now); yesterday.setDate(yesterday.getDate()-1);
  if (d.toDateString()===yesterday.toDateString()) return '昨天 '+hm;
  return (d.getMonth()+1)+'/'+d.getDate()+' '+hm;
}
