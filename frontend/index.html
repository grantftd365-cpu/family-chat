<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FamilyChat</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
<style>
:root {
  --primary: #07c160;
  --primary-dark: #06ad56;
  --bg: #ededed;
  --card: #ffffff;
  --text: #191919;
  --text-secondary: #999;
  --border: #e5e5e5;
  --danger: #fa5151;
  --agent-bg: #f0f0f0;
  --user-bg: #95ec69;
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background:var(--bg); color:var(--text); overflow:hidden; }
input,button,textarea { font-family:inherit; }
a { color:var(--primary); text-decoration:none; }

/* ===== 容器 ===== */
#app { height:100%; display:flex; flex-direction:column; }
.page { display:none; height:100%; flex-direction:column; }
.page.active { display:flex; }

/* ===== 登录页 ===== */
.login-page { justify-content:center; align-items:center; padding:40px 30px; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); }
.login-logo { font-size:64px; margin-bottom:16px; }
.login-title { color:#fff; font-size:28px; font-weight:700; margin-bottom:8px; }
.login-subtitle { color:rgba(255,255,255,.7); font-size:14px; margin-bottom:40px; }
.login-form { width:100%; max-width:360px; }
.login-form input { width:100%; padding:14px 16px; border:none; border-radius:8px; margin-bottom:12px; font-size:16px; background:rgba(255,255,255,.9); outline:none; }
.login-form input:focus { background:#fff; box-shadow:0 0 0 2px rgba(255,255,255,.3); }
.login-form input::placeholder { color:#aaa; }
.login-btn { width:100%; padding:14px; border:none; border-radius:8px; background:#fff; color:#764ba2; font-size:16px; font-weight:600; cursor:pointer; margin-bottom:12px; transition:transform .1s; }
.login-btn:active { transform:scale(.98); }
.login-switch { color:rgba(255,255,255,.8); font-size:14px; cursor:pointer; text-align:center; }
.login-switch:hover { color:#fff; }
.login-error { color:#ff6b6b; font-size:13px; text-align:center; margin-bottom:12px; background:rgba(0,0,0,.2); padding:8px; border-radius:6px; display:none; }

/* ===== 主页 Tab ===== */
.main-page { background:var(--bg); }
.tab-header { background:#f7f7f7; border-bottom:1px solid var(--border); padding:12px 16px; display:flex; justify-content:space-between; align-items:center; position:relative; z-index:10; }
.tab-header h1 { font-size:17px; font-weight:600; }
.tab-header .actions { display:flex; gap:16px; }
.tab-header .action-btn { background:none; border:none; font-size:20px; cursor:pointer; padding:4px; }
.tab-content { flex:1; overflow:hidden; position:relative; }
.tab-panel { display:none; height:100%; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.tab-panel.active { display:block; }
.tab-bar { display:flex; background:#f7f7f7; border-top:1px solid var(--border); padding:6px 0 2px; padding-bottom:env(safe-area-inset-bottom, 6px); }
.tab-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; padding:4px 0; cursor:pointer; color:var(--text-secondary); font-size:10px; transition:color .2s; border:none; background:none; }
.tab-item.active { color:var(--primary); }
.tab-item .icon { font-size:22px; }

/* ===== 聊天列表 ===== */
.chat-list { padding:0; }
.chat-item { display:flex; align-items:center; padding:12px 16px; background:var(--card); border-bottom:1px solid var(--border); cursor:pointer; transition:background .1s; }
.chat-item:active { background:#ececec; }
.chat-avatar { width:48px; height:48px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:28px; background:#f0f0f0; flex-shrink:0; position:relative; }
.chat-info { flex:1; margin-left:12px; overflow:hidden; }
.chat-name { font-size:16px; font-weight:500; margin-bottom:4px; }
.chat-preview { font-size:13px; color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.chat-meta { text-align:right; flex-shrink:0; margin-left:8px; }
.chat-time { font-size:11px; color:var(--text-secondary); }
.unread-badge { background:var(--danger); color:#fff; font-size:11px; min-width:18px; height:18px; border-radius:9px; display:inline-flex; align-items:center; justify-content:center; padding:0 5px; margin-top:4px; }

/* ===== 聊天页 ===== */
.chat-page { background:var(--bg); }
.chat-header { background:#f7f7f7; border-bottom:1px solid var(--border); padding:12px 16px; display:flex; align-items:center; gap:12px; }
.chat-back { background:none; border:none; font-size:22px; cursor:pointer; padding:4px; }
.chat-header-title { flex:1; font-size:17px; font-weight:600; }
.chat-header-sub { font-size:11px; color:var(--text-secondary); }

.chat-messages { flex:1; overflow-y:auto; padding:12px 16px; -webkit-overflow-scrolling:touch; display:flex; flex-direction:column; gap:12px; }
.msg-row { display:flex; gap:8px; max-width:85%; }
.msg-row.self { align-self:flex-end; flex-direction:row-reverse; }
.msg-row.agent { align-self:flex-start; }
.msg-avatar { width:36px; height:36px; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:20px; background:#e0e0e0; flex-shrink:0; }
.msg-bubble { padding:10px 14px; border-radius:6px; font-size:15px; line-height:1.5; word-break:break-word; position:relative; max-width:100%; }
.msg-row.self .msg-bubble { background:var(--user-bg); }
.msg-row.agent .msg-bubble { background:var(--card); }
.msg-sender { font-size:12px; color:var(--text-secondary); margin-bottom:4px; }
.msg-row.self .msg-sender { text-align:right; }
.msg-time { font-size:10px; color:#bbb; margin-top:4px; }
.msg-row.self .msg-time { text-align:right; }
.msg-agent-tag { display:inline-block; font-size:10px; background:var(--primary); color:#fff; padding:1px 5px; border-radius:3px; margin-right:4px; }

.chat-input-area { background:#f7f7f7; border-top:1px solid var(--border); padding:8px 12px; display:flex; align-items:flex-end; gap:8px; padding-bottom:calc(8px + env(safe-area-inset-bottom, 0px)); }
.chat-input { flex:1; padding:10px 14px; border:1px solid var(--border); border-radius:6px; font-size:15px; resize:none; outline:none; max-height:120px; min-height:40px; background:var(--card); line-height:1.4; }
.chat-input:focus { border-color:var(--primary); }
.chat-send-btn { padding:10px 18px; background:var(--primary); color:#fff; border:none; border-radius:6px; font-size:15px; cursor:pointer; white-space:nowrap; flex-shrink:0; }
.chat-send-btn:active { background:var(--primary-dark); }
.chat-send-btn:disabled { background:#ccc; }

/* ===== 通讯录 ===== */
.contact-list { padding:0; }
.contact-group-title { padding:8px 16px; font-size:13px; color:var(--text-secondary); background:var(--bg); position:sticky; top:0; }
.contact-item { display:flex; align-items:center; padding:12px 16px; background:var(--card); border-bottom:1px solid var(--border); cursor:pointer; }
.contact-item:active { background:#ececec; }
.contact-avatar { width:40px; height:40px; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:22px; background:#f0f0f0; flex-shrink:0; }
.contact-name { margin-left:12px; font-size:16px; }
.contact-badge { font-size:10px; background:#ff9500; color:#fff; padding:1px 6px; border-radius:3px; margin-left:8px; }

/* ===== 我的 ===== */
.profile-page { padding:0; }
.profile-header { background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); padding:40px 20px 30px; display:flex; align-items:center; gap:16px; }
.profile-avatar { width:64px; height:64px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:36px; background:rgba(255,255,255,.2); }
.profile-info h2 { color:#fff; font-size:20px; margin-bottom:4px; }
.profile-info p { color:rgba(255,255,255,.7); font-size:13px; }
.profile-section { margin-top:12px; }
.profile-item { display:flex; align-items:center; padding:14px 20px; background:var(--card); border-bottom:1px solid var(--border); cursor:pointer; }
.profile-item:active { background:#ececec; }
.profile-item-icon { font-size:20px; margin-right:12px; }
.profile-item-label { flex:1; font-size:15px; }
.profile-item-arrow { color:var(--text-secondary); }
.logout-btn { display:block; margin:20px auto; padding:12px 40px; background:none; border:1px solid var(--danger); color:var(--danger); border-radius:6px; font-size:15px; cursor:pointer; }

/* ===== 弹窗 ===== */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:100; display:none; justify-content:center; align-items:flex-end; }
.modal-overlay.show { display:flex; }
.modal { background:var(--card); border-radius:12px 12px 0 0; width:100%; max-width:500px; max-height:80vh; overflow-y:auto; padding:20px; }
.modal h3 { font-size:18px; margin-bottom:16px; text-align:center; }
.modal input, .modal textarea { width:100%; padding:12px; border:1px solid var(--border); border-radius:6px; font-size:15px; margin-bottom:12px; outline:none; }
.modal input:focus, .modal textarea:focus { border-color:var(--primary); }
.modal-btn { width:100%; padding:12px; border:none; border-radius:6px; font-size:15px; cursor:pointer; margin-bottom:8px; }
.modal-btn-primary { background:var(--primary); color:#fff; }
.modal-btn-cancel { background:var(--bg); color:var(--text); }

/* ===== 空状态 ===== */
.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--text-secondary); gap:12px; }
.empty-state .icon { font-size:48px; }
.empty-state p { font-size:14px; }

/* ===== 加载动画 ===== */
.typing-indicator { display:flex; gap:4px; padding:8px 14px; }
.typing-dot { width:8px; height:8px; background:#999; border-radius:50%; animation:typing 1.4s infinite; }
.typing-dot:nth-child(2) { animation-delay:.2s; }
.typing-dot:nth-child(3) { animation-delay:.4s; }
@keyframes typing { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
@keyframes fadeIn { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div id="app">
  <!-- ===== 登录页 ===== -->
  <div id="loginPage" class="page login-page active">
    <div class="login-logo">🏠</div>
    <div class="login-title">FamilyChat</div>
    <div class="login-subtitle">家庭数字人聊天</div>
    <div class="login-form">
      <div id="loginError" class="login-error"></div>
      <div id="regNameGroup" style="display:none">
        <input id="regNickname" placeholder="你的昵称" autocomplete="off">
      </div>
      <input id="loginUser" placeholder="用户名" autocomplete="username">
      <input id="loginPass" type="password" placeholder="密码" autocomplete="current-password">
      <button class="login-btn" onclick="doLogin()">登录</button>
      <div class="login-switch" onclick="toggleReg()">没有账号？<b>注册</b></div>
    </div>
  </div>

  <!-- ===== 主页 ===== -->
  <div id="mainPage" class="page main-page">
    <div class="tab-header">
      <h1>FamilyChat</h1>
      <div class="actions">
        <button class="action-btn" onclick="showCreateGroup()" title="创建群聊">➕</button>
      </div>
    </div>
    <div class="tab-content">
      <!-- 聊天列表 -->
      <div id="tabChat" class="tab-panel active">
        <div id="chatList" class="chat-list"></div>
      </div>
      <!-- 通讯录 -->
      <div id="tabContact" class="tab-panel">
        <div id="contactList" class="contact-list"></div>
      </div>
      <!-- 我的 -->
      <div id="tabProfile" class="tab-panel">
        <div class="profile-page">
          <div class="profile-header">
            <div class="profile-avatar" id="myAvatar">😀</div>
            <div class="profile-info">
              <h2 id="myName">-</h2>
              <p id="myId">-</p>
            </div>
          </div>
          <div class="profile-section">
            <div class="profile-item" onclick="showAgentManager()">
              <span class="profile-item-icon">🤖</span>
              <span class="profile-item-label">数字人管理</span>
              <span class="profile-item-arrow">›</span>
            </div>
            <div class="profile-item" onclick="showMemoryViewer()">
              <span class="profile-item-icon">🧠</span>
              <span class="profile-item-label">记忆库</span>
              <span class="profile-item-arrow">›</span>
            </div>
          </div>
          <button class="logout-btn" onclick="doLogout()">退出登录</button>
        </div>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab-item active" onclick="switchTab('chat',this)">
        <span class="icon">💬</span><span>聊天</span>
      </button>
      <button class="tab-item" onclick="switchTab('contact',this)">
        <span class="icon">👥</span><span>通讯录</span>
      </button>
      <button class="tab-item" onclick="switchTab('profile',this)">
        <span class="icon">👤</span><span>我的</span>
      </button>
    </div>
  </div>

  <!-- ===== 聊天页 ===== -->
  <div id="chatPage" class="page chat-page">
    <div class="chat-header">
      <button class="chat-back" onclick="goBack()">‹</button>
      <div>
        <div class="chat-header-title" id="chatTitle">-</div>
        <div class="chat-header-sub" id="chatSub">-</div>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="emoji-panel" id="emojiPanel"></div>
    <div class="chat-input-area">
      <button class="input-mode-btn" onclick="toggleEmoji()" title="表情">😊</button>
      <button class="input-mode-btn" onclick="$('imageInput').click()" title="图片">📷</button>
      <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="uploadImage(this)">
      <button class="input-mode-btn" id="voiceModeBtn" onclick="toggleVoiceMode()" title="语音">🎤</button>
      <textarea class="chat-input" id="chatInput" placeholder="输入消息..." rows="1" onkeydown="handleKey(event)"></textarea>
      <button class="voice-record-btn" id="voiceRecordBtn" style="display:none" onmousedown="startRecord()" onmouseup="stopRecord()" ontouchstart="startRecord()" ontouchend="stopRecord()">🎤</button>
      <button class="chat-send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
    </div>
  </div>
</div>

<!-- 创建群聊弹窗 -->
<div id="createGroupModal" class="modal-overlay" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal">
    <h3>创建群聊</h3>
    <input id="newGroupName" placeholder="群名称">
    <input id="newGroupDesc" placeholder="群描述（可选）">
    <button class="modal-btn modal-btn-primary" onclick="doCreateGroup()">创建</button>
    <button class="modal-btn modal-btn-cancel" onclick="document.getElementById('createGroupModal').classList.remove('show')">取消</button>
  </div>
</div>

<!-- 创建 Agent 弹窗 -->
<div id="createAgentModal" class="modal-overlay" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal">
    <h3>创建数字人</h3>
    <input id="agentName" placeholder="名字（如：爸爸）">
    <input id="agentAvatar" placeholder="头像 emoji（如：👨）" value="🤖">
    <textarea id="agentBackstory" placeholder="背景故事" rows="3"></textarea>
    <textarea id="agentStyle" placeholder="说话风格" rows="2"></textarea>
    <input id="agentTraits" placeholder="性格特质（逗号分隔）">
    <input id="agentInterests" placeholder="兴趣爱好（逗号分隔）">
    <input id="agentCatchphrases" placeholder="口头禅（逗号分隔）">
    <button class="modal-btn modal-btn-primary" onclick="doCreateAgent()">创建</button>
    <button class="modal-btn modal-btn-cancel" onclick="document.getElementById('createAgentModal').classList.remove('show')">取消</button>
  </div>
</div>

<script>
// ==================== 全局状态 ====================
const S = {
  token: localStorage.getItem('fc_token') || '',
  user: JSON.parse(localStorage.getItem('fc_user') || 'null'),
  groups: [],
  agents: [],
  currentGroup: null,
  ws: null,
  isReg: false,
};

const API = '';

// ==================== 工具函数 ====================
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (S.token) headers['Authorization'] = `Bearer ${S.token}`;
  const res = await fetch(API + path, { ...opts, headers });
  if (res.status === 401) { doLogout(); throw new Error('未登录'); }
  if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.detail || '请求失败'); }
  return res.json();
}

function $(id) { return document.getElementById(id); }
function show(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); $(id).classList.add('active'); }
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
  $('tab' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
  btn.classList.add('active');
  if (name === 'contact') loadContacts();
}
function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts * 1000);
  const now = new Date();
  const hm = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (d.toDateString() === now.toDateString()) return hm;
  return (d.getMonth()+1) + '/' + d.getDate() + ' ' + hm;
}
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ==================== 登录/注册 ====================
function toggleReg() {
  S.isReg = !S.isReg;
  $('regNameGroup').style.display = S.isReg ? 'block' : 'none';
  document.querySelector('.login-switch').innerHTML = S.isReg
    ? '已有账号？<b>登录</b>'
    : '没有账号？<b>注册</b>';
  document.querySelector('.login-btn').textContent = S.isReg ? '注册' : '登录';
}

async function doLogin() {
  const user = $('loginUser').value.trim();
  const pass = $('loginPass').value.trim();
  const nick = $('regNickname')?.value.trim();
  if (!user || !pass) return showLoginError('请填写用户名和密码');
  if (S.isReg && !nick) return showLoginError('请填写昵称');

  try {
    const ep = S.isReg ? '/api/register' : '/api/login';
    const body = S.isReg ? { username: user, password: pass, nickname: nick } : { username: user, password: pass };
    const data = await api(ep, { method: 'POST', body: JSON.stringify(body) });
    S.token = data.token;
    S.user = data.user;
    localStorage.setItem('fc_token', data.token);
    localStorage.setItem('fc_user', JSON.stringify(data.user));
    enterApp();
  } catch (e) {
    showLoginError(e.message);
  }
}

function showLoginError(msg) {
  const el = $('loginError');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

function doLogout() {
  S.token = '';
  S.user = null;
  localStorage.removeItem('fc_token');
  localStorage.removeItem('fc_user');
  if (S.ws) S.ws.close();
  show('loginPage');
}

// ==================== 进入应用 ====================
async function enterApp() {
  show('mainPage');
  $('myName').textContent = S.user?.nickname || S.user?.username || '-';
  $('myId').textContent = 'ID: ' + (S.user?.id || '-');
  await loadGroups();
  await loadAgents();
  connectWS();
}

// ==================== 群组 ====================
async function loadGroups() {
  try {
    S.groups = await api('/api/groups');
    renderGroups();
  } catch (e) { console.error(e); }
}

function renderGroups() {
  const el = $('chatList');
  if (!S.groups.length) {
    el.innerHTML = '<div class="empty-state"><span class="icon">💬</span><p>暂无聊天</p></div>';
    return;
  }
  el.innerHTML = S.groups.map(g => `
    <div class="chat-item" onclick="openChat('${g.id}','${escHtml(g.name)}','${g.avatar||'👥'}')">
      <div class="chat-avatar">${g.avatar || '👥'}</div>
      <div class="chat-info">
        <div class="chat-name">${escHtml(g.name)}</div>
        <div class="chat-preview">${escHtml(g.last_message || '暂无消息')}</div>
      </div>
      <div class="chat-meta">
        <div class="chat-time">${formatTime(g.last_time)}</div>
      </div>
    </div>
  `).join('');
}

function showCreateGroup() {
  $('createGroupModal').classList.add('show');
}

async function doCreateGroup() {
  const name = $('newGroupName').value.trim();
  if (!name) return;
  try {
    await api('/api/groups', { method: 'POST', body: JSON.stringify({ name, description: $('newGroupDesc').value }) });
    $('createGroupModal').classList.remove('show');
    $('newGroupName').value = '';
    $('newGroupDesc').value = '';
    await loadGroups();
  } catch (e) { alert(e.message); }
}

// ==================== 通讯录 ====================
async function loadContacts() {
  const el = $('contactList');
  let html = '<div class="contact-group-title">数字人</div>';
  for (const a of S.agents) {
    html += `
      <div class="contact-item">
        <div class="contact-avatar">${a.avatar || '🤖'}</div>
        <div class="contact-name">${escHtml(a.name)}</div>
        <span class="contact-badge">AI</span>
      </div>`;
  }
  
  // 加载群成员
  if (S.currentGroup) {
    try {
      const members = await api(`/api/groups/${S.currentGroup}/members`);
      html += '<div class="contact-group-title">群成员</div>';
      for (const m of members) {
        html += `
          <div class="contact-item">
            <div class="contact-avatar">${m.avatar}</div>
            <div class="contact-name">${escHtml(m.name)}${m.is_agent ? '<span class="contact-badge">AI</span>' : ''}</div>
          </div>`;
      }
    } catch (e) {}
  }
  el.innerHTML = html;
}

// ==================== Agent ====================
async function loadAgents() {
  try {
    S.agents = await api('/api/agents');
  } catch (e) { console.error(e); }
}

    await api('/api/agents', {

function showMemoryViewer() {

}

// ==================== 聊天 ====================
async function openChat(groupId, name, avatar) {
  S.currentGroup = groupId;
  $('chatTitle').textContent = name;
  $('chatSub').textContent = '群聊';
  show('chatPage');
  
  const el = $('chatMessages');
  el.innerHTML = '<div class="empty-state"><span class="icon">⏳</span><p>加载中...</p></div>';
  
  try {
    const msgs = await api(`/api/messages/${groupId}?limit=100`);
    renderMessages(msgs);
  } catch (e) {
    el.innerHTML = '<div class="empty-state"><span class="icon">❌</span><p>加载失败</p></div>';
  }
  
  // 加入群 WebSocket
  if (S.ws && S.ws.readyState === 1) {
    S.ws.send(JSON.stringify({ type: 'join_group', group_id: groupId }));
  }
}

function renderMessages(msgs) {
  const el = $('chatMessages');
  if (!msgs.length) {
    el.innerHTML = '<div class="empty-state"><span class="icon">💬</span><p>暂无消息，说点什么吧</p></div>';
    return;
  }
  
  el.innerHTML = msgs.map(m => {
    const isSelf = m.sender_id === S.user?.id;
    const rowClass = isSelf ? 'self' : 'agent';
    const avatar = m.is_agent ? (m.agent_avatar || '🤖') : '😀';
    const tag = m.is_agent ? '<span class="msg-agent-tag">AI</span>' : '';
    
    return `
      <div class="msg-row ${rowClass}">
        <div class="msg-avatar">${avatar}</div>
        <div>
          <div class="msg-sender">${tag}${escHtml(m.sender_name)}</div>
          <div class="msg-bubble">${escHtml(m.content)}</div>
          <div class="msg-time">${formatTime(m.created_at)}</div>
        </div>
      </div>`;
  }).join('');
  
  el.scrollTop = el.scrollHeight;
}

function appendMessage(data) {
  const el = $('chatMessages');
  const empty = el.querySelector('.empty-state');
  if (empty) empty.remove();
  if (data.is_agent) removeTypingIndicator(data.sender_name);
  
  const isSelf = data.sender_id === S.user?.id;
  const rowClass = isSelf ? 'self' : 'agent';
  const avatar = data.is_agent ? (data.agent_avatar || '🤖') : '😀';
  const tag = data.is_agent ? '<span class="msg-agent-tag">AI</span>' : '';
  
  let bubble = '';
  if (data.msg_type === 'voice' && data.voice_url) {
    bubble = `<div class="voice-msg" onclick="playVoice('${data.voice_url}',this)"><span class="voice-icon">🔊</span><div class="voice-wave"><span></span><span></span><span></span><span></span><span></span></div><span class="voice-dur">语音</span></div>`;
  } else if (data.msg_type === 'image') {
    const imgUrl = data.content.startsWith('/') ? data.content : data.content;
    bubble = `<img src="${imgUrl}" style="max-width:200px;max-height:200px;border-radius:6px;cursor:pointer" onclick="window.open(this.src)" onerror="this.style.display='none'">`;
  } else {
    bubble = escHtml(data.content);
  }
  
  const div = document.createElement('div');
  div.innerHTML = `<div class="msg-row ${rowClass}"><div class="msg-avatar">${avatar}</div><div><div class="msg-sender">${tag}${escHtml(data.sender_name)}</div><div class="msg-bubble">${bubble}</div><div class="msg-time">${formatTime(data.created_at)}</div></div></div>`;
  el.appendChild(div.firstElementChild);
  el.scrollTop = el.scrollHeight;
}

// ==================== 发送消息 ====================
async function sendMessage() {
  const input = $('chatInput');
  const content = input.value.trim();
  if (!content || !S.currentGroup) return;
  
  input.value = '';
  input.style.height = 'auto';
  $('sendBtn').disabled = true;
  
  try {
    const data = await api('/api/messages', {
      method: 'POST',
      body: JSON.stringify({ group_id: S.currentGroup, content, msg_type: 'text' }),
    });
    
    appendMessage({
      id: data.id,
      sender_id: S.user.id,
      sender_name: S.user.nickname,
      content,
      msg_type: 'text',
      is_agent: false,
      created_at: data.created_at,
    });
  } catch (e) {
    showToast('发送失败: ' + e.message, 'error');
  }
  
  $('sendBtn').disabled = false;
  input.focus();
}

function showToast(msg, type='info') {
  const d = document.createElement('div');
  d.style.cssText = `position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:14px;z-index:999;color:#fff;background:${type==='error'?'var(--danger)':'var(--primary)'};animation:fadeIn .3s;`;
  d.textContent = msg;
  document.body.appendChild(d);
  setTimeout(() => d.remove(), 3000);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
  // 自动调整高度
  setTimeout(() => {
    const el = $('chatInput');
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }, 0);
}

// ==================== 语音消息 ====================
let mediaRecorder = null, audioChunks = [], isVoiceMode = false;

function toggleVoiceMode() {
  isVoiceMode = !isVoiceMode;
  $('chatInput').style.display = isVoiceMode ? 'none' : 'block';
  $('voiceRecordBtn').style.display = isVoiceMode ? 'block' : 'none';
  $('voiceModeBtn').style.color = isVoiceMode ? 'var(--primary)' : '';
}

async function startRecord() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.start();
    $('voiceRecordBtn').classList.add('recording');
    $('voiceRecordBtn').textContent = '⏹';
  } catch(e) { alert('需要麦克风权限'); }
}

async function stopRecord() {
  if (!mediaRecorder || mediaRecorder.state !== 'recording') return;
  $('voiceRecordBtn').classList.remove('recording');
  $('voiceRecordBtn').textContent = '🎤';
  mediaRecorder.stop();
  mediaRecorder.stream.getTracks().forEach(t => t.stop());
  mediaRecorder.onstop = async () => {
    const blob = new Blob(audioChunks, { type: 'audio/webm' });
    const form = new FormData();
    form.append('file', blob, 'voice.webm');
    try {
      const resp = await fetch('/api/voice/upload', { method:'POST', headers:{'Authorization':'Bearer '+S.token}, body:form });
      const data = await resp.json();
      await api('/api/messages', { method:'POST', body:JSON.stringify({ group_id:S.currentGroup, content:'[语音消息]', msg_type:'voice', voice_url:data.url }) });
      appendMessage({ id:Date.now(), sender_id:S.user.id, sender_name:S.user.nickname, content:'[语音消息]', msg_type:'voice', voice_url:data.url, is_agent:false, created_at:Date.now()/1000 });
    } catch(e) { console.error('语音发送失败',e); }
  };
}

function playVoice(url, el) {
  const audio = new Audio(url);
  el.classList.add('voice-playing');
  audio.play();
  audio.onended = () => el.classList.remove('voice-playing');
}

// ==================== 表情 ====================
const EMOJIS = ['😀','😂','🤣','😊','😍','🥰','😘','😋','🤔','😅','😢','😭','😡','🥺','😴','🙏','👍','👎','❤️','💔','🎉','🎊','💪','👏','🤝','✌️','💐','🌹','🎂','🍰','🍜','🍲','🎣','♟️','📰','💊'];

// ==================== 图片上传 ====================
async function uploadImage(input) {
  const file = input.files[0];
  if (!file || !S.currentGroup) return;
  
  const form = new FormData();
  form.append('file', file);
  
  try {
    const resp = await fetch('/api/upload/image', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + S.token },
      body: form,
    });
    const data = await resp.json();
    
    await api('/api/messages', {
      method: 'POST',
      body: JSON.stringify({
        group_id: S.currentGroup,
        content: data.url,
        msg_type: 'image',
      }),
    });
    
    appendMessage({
      id: Date.now(),
      sender_id: S.user.id,
      sender_name: S.user.nickname,
      content: data.url,
      msg_type: 'image',
      is_agent: false,
      created_at: Date.now() / 1000,
    });
  } catch (e) {
    showToast('图片上传失败', 'error');
  }
  
  input.value = '';
}

// ==================== 打字提示 ====================
function showTypingIndicator(name) {
  const el = $('chatMessages');
  const d = document.createElement('div');
  d.id = 'typing-'+name;
  d.innerHTML = `<div class="msg-row agent"><div class="msg-avatar">🤖</div><div><div class="msg-sender">${name}</div><div class="msg-bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div></div></div>`;
  el.appendChild(d.firstElementChild);
  el.scrollTop = el.scrollHeight;
}
function removeTypingIndicator(name) { const e=document.getElementById('typing-'+name); if(e)e.remove(); }

// ==================== WebSocket ====================
function connectWS() {
  if (!S.token) return;
  
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws?token=${S.token}`);
  
  ws.onopen = () => {
    console.log('WebSocket 已连接');
    S.ws = ws;
    // 加入当前群
    if (S.currentGroup) {
      ws.send(JSON.stringify({ type: 'join_group', group_id: S.currentGroup }));
    }
  };
  
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'message' && msg.data) {
        if (msg.data.is_agent && msg.data.group_id === S.currentGroup) {
          showTypingIndicator(msg.data.sender_name);
          setTimeout(() => appendMessage(msg.data), 1500);
        } else if (msg.data.group_id === S.currentGroup) {
          appendMessage(msg.data);
        }
        updateGroupPreview(msg.data.group_id, msg.data.content, msg.data.created_at);
      }
    } catch (err) {}
  };
  
  ws.onclose = () => {
    console.log('WebSocket 断开，3秒后重连...');
    setTimeout(connectWS, 3000);
  };
  
  ws.onerror = (e) => console.error('WebSocket 错误', e);
}

function updateGroupPreview(groupId, content, time) {
  const g = S.groups.find(g => g.id === groupId);
  if (g) {
    g.last_message = content;
    g.last_time = time;
    renderGroups();
  }
}

  show('mainPage');
  S.currentGroup = null;
  loadGroups();
}

    }
