<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>FamilyChat</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
<style>
:root {
  --green: #07C160;
  --green-dark: #06AD56;
  --bg: #EDEDED;
  --bg-dark: #D9D9D9;
  --card: #FFFFFF;
  --text: #111111;
  --text-sub: #888888;
  --text-light: #B2B2B2;
  --border: #E6E6E6;
  --danger: #FA5151;
  --link: #576B95;
  --chat-right: #95EC69;
  --chat-left: #FFFFFF;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); font-size:16px; overflow:hidden; }
input,textarea,button { font-family:inherit; font-size:16px; }
::-webkit-scrollbar { width:0; display:none; }

/* ===== 全局容器 ===== */
#app { height:100%; position:relative; overflow:hidden; }
.page { display:none; height:100%; flex-direction:column; position:absolute; inset:0; background:var(--bg); z-index:1; }
.page.active { display:flex; }

/* ===== 微信绿色顶栏 ===== */
.wx-header {
  padding:12px 16px; padding-top:calc(12px + var(--safe-top));
  display:flex; align-items:center; gap:12px;
  min-height:56px; position:relative; z-index:10;
}
.wx-header-title { flex:1; font-size:17px; font-weight:600; text-align:center; }
.wx-header .back { background:none; border:none; font-size:22px; color:var(--text); cursor:pointer; padding:4px 8px 4px 0; line-height:1; }
.wx-header .action { background:none; border:none; font-size:20px; cursor:pointer; padding:4px; }

/* ===== 登录页 ===== */
.login-page {
  background:#F6F6F6; justify-content:flex-start; align-items:center;
  padding:0 24px;
}
.login-hero { text-align:center; padding:80px 0 40px; }
.login-hero .logo { font-size:72px; margin-bottom:16px; }
.login-hero h1 { font-size:22px; font-weight:600; color:var(--text); margin-bottom:6px; }
.login-hero p { font-size:14px; color:var(--text-sub); }
.login-form { width:100%; max-width:400px; }
.login-form .field { position:relative; margin-bottom:0; border-bottom:1px solid var(--border); }
.login-form .field input {
  width:100%; padding:16px 0; border:none; background:transparent;
  font-size:16px; outline:none; color:var(--text);
}
.login-form .field input::placeholder { color:var(--text-light); }
.login-form .extra-fields { display:none; }
.login-form .extra-fields.show { display:block; }
.login-form .error { color:var(--danger); font-size:13px; padding:8px 0; display:none; text-align:center; }
.login-btn {
  width:100%; padding:14px; margin-top:24px; border:none; border-radius:6px;
  background:var(--green); color:#fff; font-size:17px; font-weight:500;
  cursor:pointer; transition:opacity .2s;
}
.login-btn:active { opacity:.8; }
.login-switch { text-align:center; margin-top:16px; font-size:14px; color:var(--link); cursor:pointer; }

/* ===== 主页 ===== */
.main-page { background:var(--bg); }
.main-header {
  background:#EDEDED; border-bottom:0.5px solid var(--border);
  padding:12px 16px; padding-top:calc(12px + var(--safe-top));
  display:flex; justify-content:space-between; align-items:center;
}
.main-header h1 { font-size:17px; font-weight:600; }
.main-header .actions { display:flex; gap:20px; }
.main-header .actions button { background:none; border:none; font-size:20px; cursor:pointer; }

/* Tab 栏 */
.tab-bar {
  display:flex; background:#F7F7F7; border-top:0.5px solid var(--border);
  padding:4px 0; padding-bottom:calc(4px + var(--safe-bottom));
}
.tab-item {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:4px 0; cursor:pointer; border:none; background:none;
  color:var(--text-sub); font-size:10px; transition:color .2s;
}
.tab-item.active { color:var(--green); }
.tab-item .icon { font-size:22px; line-height:1.2; }
.tab-item .dot { width:6px; height:6px; background:var(--danger); border-radius:50%; position:absolute; top:-2px; right:-2px; }
.tab-panel { display:none; flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.tab-panel.active { display:block; }

/* ===== 聊天列表 ===== */
.chat-item {
  display:flex; align-items:center; padding:12px 16px;
  background:var(--card); border-bottom:0.5px solid var(--border);
  cursor:pointer; transition:background .1s;
}
.chat-item:active { background:#D9D9D9; }
.chat-avatar {
  width:52px; height:52px; border-radius:6px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:28px; position:relative;
}
.chat-body { flex:1; margin-left:12px; overflow:hidden; }
.chat-body .name { font-size:17px; font-weight:400; line-height:1.4; }
.chat-body .preview { font-size:14px; color:var(--text-sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.chat-meta { text-align:right; flex-shrink:0; margin-left:8px; }
.chat-meta .time { font-size:12px; color:var(--text-sub); }
.chat-meta .badge {
  display:inline-block; min-width:18px; height:18px; border-radius:9px;
  background:var(--danger); color:#fff; font-size:11px; text-align:center;
  line-height:18px; padding:0 5px; margin-top:4px;
}

/* ===== 聊天页 ===== */
.chat-page { background:var(--bg); }
.msgs { flex:1; overflow-y:auto; padding:12px 16px; -webkit-overflow-scrolling:touch; }
.msg-row { display:flex; gap:8px; margin-bottom:16px; max-width:82%; animation:msgIn .25s ease-out; }
.msg-row.right { margin-left:auto; flex-direction:row-reverse; }
.msg-row.left { margin-right:auto; }
@keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

.msg-av { width:40px; height:40px; border-radius:4px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:22px; background:#E0E0E0; }
.msg-content { display:flex; flex-direction:column; }
.msg-name { font-size:12px; color:var(--text-sub); margin-bottom:4px; padding:0 4px; }
.msg-row.right .msg-name { text-align:right; }
.msg-tag { display:inline-block; font-size:10px; background:var(--green); color:#fff; padding:0 4px; border-radius:2px; margin-right:4px; vertical-align:middle; }
.msg-bubble {
  padding:10px 14px; border-radius:4px; font-size:16px; line-height:1.5;
  word-break:break-word; position:relative; max-width:100%;
}
.msg-row.right .msg-bubble { background:var(--chat-right); }
.msg-row.left .msg-bubble { background:var(--chat-left); }
/* 气泡尖角 */
.msg-row.right .msg-bubble::after {
  content:''; position:absolute; top:12px; right:-6px;
  border:6px solid transparent; border-left-color:var(--chat-right);
}
.msg-row.left .msg-bubble::after {
  content:''; position:absolute; top:12px; left:-6px;
  border:6px solid transparent; border-right-color:var(--chat-left);
}
.msg-time { font-size:11px; color:var(--text-light); margin-top:4px; padding:0 4px; }
.msg-row.right .msg-time { text-align:right; }

/* 语音消息 */
.voice-bubble { display:flex; align-items:center; gap:8px; min-width:100px; cursor:pointer; }
.voice-bubble .icon { font-size:16px; }
.voice-wave { display:flex; align-items:center; gap:2px; height:18px; }
.voice-wave span { width:3px; border-radius:2px; background:var(--text); }
.voice-wave span:nth-child(1){height:6px} .voice-wave span:nth-child(2){height:12px}
.voice-wave span:nth-child(3){height:8px} .voice-wave span:nth-child(4){height:14px}
.voice-wave span:nth-child(5){height:6px}
.voice-playing .voice-wave span { background:var(--green); animation:wave 1s ease-in-out infinite; }
.voice-playing .voice-wave span:nth-child(2){animation-delay:.1s} .voice-playing .voice-wave span:nth-child(3){animation-delay:.2s}
.voice-playing .voice-wave span:nth-child(4){animation-delay:.3s} .voice-playing .voice-wave span:nth-child(5){animation-delay:.4s}
@keyframes wave { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(.3)} }
.voice-dur { font-size:12px; color:var(--text-sub); }

/* 图片消息 */
.msg-img { max-width:200px; max-height:200px; border-radius:4px; cursor:pointer; display:block; }

/* 打字提示 */
.typing-dots { display:flex; gap:4px; padding:10px 14px; }
.typing-dots span { width:8px; height:8px; background:#999; border-radius:50%; animation:typing 1.4s infinite; }
.typing-dots span:nth-child(2){animation-delay:.2s} .typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes typing { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

/* ===== 输入区域 ===== */
.input-area {
  background:#F7F7F7; border-top:0.5px solid var(--border);
  padding:8px 12px; padding-bottom:calc(8px + var(--safe-bottom));
  display:flex; align-items:flex-end; gap:8px;
}
.input-area .tool-btn { background:none; border:none; font-size:24px; cursor:pointer; padding:4px; flex-shrink:0; line-height:1; }
.input-area textarea {
  flex:1; padding:10px 14px; border:0.5px solid var(--border); border-radius:6px;
  background:var(--card); font-size:16px; resize:none; outline:none;
  max-height:120px; min-height:40px; line-height:1.4;
}
.input-area textarea:focus { border-color:var(--green); }
.send-btn {
  padding:10px 16px; background:var(--green); color:#fff; border:none;
  border-radius:6px; font-size:15px; cursor:pointer; flex-shrink:0; white-space:nowrap;
}
.send-btn:active { background:var(--green-dark); }
.send-btn:disabled { background:#C0C0C0; }

/* 录音按钮 */
.record-btn {
  width:100%; padding:12px; border:2px solid var(--green); border-radius:30px;
  background:var(--card); color:var(--green); font-size:16px; cursor:pointer;
  flex:1; text-align:center; transition:all .2s;
}
.record-btn:active,.record-btn.recording { background:var(--green); color:#fff; border-color:var(--green); }
.record-btn.recording { animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(7,193,96,.3)} 50%{box-shadow:0 0 0 10px rgba(7,193,96,0)} }

/* 表情面板 */
.emoji-panel {
  display:none; background:var(--card); border-top:0.5px solid var(--border);
  padding:12px; max-height:200px; overflow-y:auto;
  flex-wrap:wrap; gap:2px;
}
.emoji-panel.show { display:flex; }
.emoji-item { width:36px; height:36px; display:flex; align-items:center; justify-content:center; font-size:22px; cursor:pointer; border-radius:4px; }
.emoji-item:active { background:var(--bg); }

/* ===== 通讯录 ===== */
.section-title { padding:8px 16px; font-size:13px; color:var(--text-sub); background:var(--bg); position:sticky; top:0; z-index:1; }
.contact-item {
  display:flex; align-items:center; padding:12px 16px;
  background:var(--card); border-bottom:0.5px solid var(--border); cursor:pointer;
}
.contact-item:active { background:#ECECEC; }
.contact-av { width:40px; height:40px; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
.contact-name { margin-left:12px; font-size:17px; flex:1; }
.contact-badge { font-size:10px; background:var(--green); color:#fff; padding:1px 6px; border-radius:3px; margin-left:8px; }

/* ===== 我的 ===== */
.profile-hd {
  background:linear-gradient(135deg,#4A90D9 0%,#357ABD 100%);
  padding:60px 20px 30px; display:flex; align-items:center; gap:16px;
}
.profile-av { width:64px; height:64px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:36px; background:rgba(255,255,255,.2); }
.profile-info h2 { color:#fff; font-size:20px; font-weight:600; margin-bottom:4px; }
.profile-info p { color:rgba(255,255,255,.7); font-size:14px; }
.profile-section { margin-top:10px; }
.profile-row {
  display:flex; align-items:center; padding:14px 20px;
  background:var(--card); border-bottom:0.5px solid var(--border); cursor:pointer;
}
.profile-row:active { background:#ECECEC; }
.profile-row .icon { font-size:20px; margin-right:12px; }
.profile-row .label { flex:1; font-size:17px; }
.profile-row .arrow { color:var(--text-light); font-size:16px; }
.logout-btn { display:block; margin:20px auto; padding:12px 40px; background:none; border:1px solid var(--danger); color:var(--danger); border-radius:6px; font-size:16px; cursor:pointer; }

/* ===== 弹窗 ===== */
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; display:none; align-items:flex-end; justify-content:center; }
.modal-bg.show { display:flex; }
.modal-box {
  background:var(--card); border-radius:12px 12px 0 0; width:100%; max-width:500px;
  max-height:85vh; overflow-y:auto; padding:20px;
}
.modal-box h3 { font-size:18px; font-weight:600; text-align:center; margin-bottom:20px; }
.modal-box input,.modal-box textarea {
  width:100%; padding:14px; border:0.5px solid var(--border); border-radius:6px;
  font-size:16px; margin-bottom:12px; outline:none; background:#FAFAFA;
}
.modal-box input:focus,.modal-box textarea:focus { border-color:var(--green); background:#fff; }
.modal-btn { width:100%; padding:14px; border:none; border-radius:6px; font-size:16px; cursor:pointer; margin-bottom:8px; }
.modal-btn-ok { background:var(--green); color:#fff; }
.modal-btn-cancel { background:var(--bg); color:var(--text); }

/* ===== 空状态 ===== */
.empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--text-sub); gap:12px; }
.empty .icon { font-size:48px; }
.empty p { font-size:14px; }

/* ===== Toast ===== */
.toast {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  padding:12px 24px; background:rgba(0,0,0,.75); color:#fff;
  border-radius:8px; font-size:14px; z-index:999;
  animation:toastIn .3s ease-out;
}
@keyframes toastIn { from{opacity:0;transform:translate(-50%,-50%) scale(.9)} to{opacity:1;transform:translate(-50%,-50%) scale(1)} }
</style>
</head>
<body>
<div id="app">
  <!-- ===== 登录页 ===== -->
  <div id="loginPage" class="page login-page active">
    <div class="login-hero">
      <div class="logo">🏠</div>
      <h1>FamilyChat</h1>
      <p>家庭数字人聊天</p>
    </div>
    <div class="login-form">
      <div id="loginError" class="error"></div>
      <div id="extraFields" class="extra-fields">
        <div class="field"><input id="regNick" placeholder="你的昵称"></div>
        <div class="field"><input id="regRole" placeholder="家庭角色（爸爸/妈妈/儿子...）"></div>
      </div>
      <div class="field"><input id="loginEmail" type="email" placeholder="邮箱"></div>
      <div class="field"><input id="loginPass" type="password" placeholder="密码"></div>
      <button class="login-btn" id="loginBtn">登录</button>
      <div class="login-switch" id="loginSwitch">注册新账号</div>
    </div>
  </div>

  <!-- ===== 主页 ===== -->
  <div id="mainPage" class="page main-page">
    <div class="main-header">
      <h1>微信</h1>
      <div class="actions">
        <button onclick="showModal('createGroupModal')" title="发起群聊">＋</button>
      </div>
    </div>
    <div style="flex:1;overflow:hidden;position:relative;">
      <div id="panelChat" class="tab-panel active"></div>
      <div id="panelContact" class="tab-panel"></div>
      <div id="panelProfile" class="tab-panel"></div>
    </div>
    <div class="tab-bar">
      <button class="tab-item active" onclick="switchTab('Chat',this)"><span class="icon">💬</span><span>微信</span></button>
      <button class="tab-item" onclick="switchTab('Contact',this)"><span class="icon">👥</span><span>通讯录</span></button>
      <button class="tab-item" onclick="switchTab('Profile',this)"><span class="icon">👤</span><span>我</span></button>
    </div>
  </div>

  <!-- ===== 聊天页 ===== -->
  <div id="chatPage" class="page chat-page">
    <div class="wx-header">
      <button class="back" onclick="goBack()">‹</button>
      <div class="wx-header-title" id="chatTitle">-</div>
      <button class="action" onclick="showModal('membersModal')">⋯</button>
    </div>
    <div class="msgs" id="msgList"></div>
    <div class="emoji-panel" id="emojiPanel"></div>
    <div class="input-area" id="inputArea">
      <button class="tool-btn" onclick="toggleEmoji()">😊</button>
      <button class="tool-btn" onclick="$('imgFile').click()">📷</button>
      <input type="file" id="imgFile" accept="image/*" style="display:none" onchange="sendImage(this)">
      <button class="tool-btn" id="voiceToggle" onclick="toggleVoice()">🎤</button>
      <textarea id="msgInput" rows="1" placeholder="消息" oninput="autoGrow(this)" onkeydown="onKey(event)"></textarea>
      <button class="record-btn" id="recordBtn" style="display:none" onmousedown="recStart()" onmouseup="recStop()" ontouchstart="recStart()" ontouchend="recStop()">按住 说话</button>
      <button class="send-btn" id="sendBtn" onclick="sendText()">发送</button>
    </div>
  </div>
</div>

<!-- 弹窗: 创建群 -->
<div id="createGroupModal" class="modal-bg" onclick="if(event.target===this)closeModal(this)">
  <div class="modal-box">
    <h3>发起群聊</h3>
    <input id="newGroupName" placeholder="群名称">
    <input id="newGroupDesc" placeholder="群描述（可选）">
    <button class="modal-btn modal-btn-ok" onclick="doCreateGroup()">确定</button>
    <button class="modal-btn modal-btn-cancel" onclick="closeModal($('createGroupModal'))">取消</button>
  </div>
</div>

<!-- 弹窗: 炼化 -->
<div id="refineModal" class="modal-bg" onclick="if(event.target===this)closeModal(this)">
  <div class="modal-box">
    <h3>🧪 炼化数字人</h3>
    <p style="color:#888;font-size:13px;margin-bottom:16px;text-align:center">输入真人聊天记录、自我介绍，AI会提取性格特征</p>
    <textarea id="refineText" rows="6" placeholder="粘贴聊天记录或自我介绍..."></textarea>
    <button class="modal-btn modal-btn-ok" onclick="doRefine()">开始炼化</button>
    <button class="modal-btn modal-btn-cancel" onclick="closeModal($('refineModal'))">取消</button>
  </div>
</div>

<!-- 弹窗: 成员 -->
<div id="membersModal" class="modal-bg" onclick="if(event.target===this)closeModal(this)">
  <div class="modal-box">
    <h3>群成员</h3>
    <div id="memberList"></div>
    <button class="modal-btn modal-btn-cancel" style="margin-top:16px" onclick="closeModal($('membersModal'))">关闭</button>
  </div>
</div>

<script>
// ==================== 状态 ====================
const S = {
  token: localStorage.getItem('fc_token') || '',
  user: JSON.parse(localStorage.getItem('fc_user') || 'null'),
  groups: [], agents: [], curGroup: null, curGroupName: '',
  ws: null, isReg: false, voiceMode: false,
};

const $ = id => document.getElementById(id);

// ==================== API ====================
async function api(path, opts={}) {
  const h = {'Content-Type':'application/json'};
  if (S.token) h['Authorization'] = `Bearer ${S.token}`;
  const r = await fetch(path, {...opts, headers:{...h,...opts.headers}});
  if (r.status===401) { doLogout(); throw new Error('未登录'); }
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.detail||'请求失败'); }
  return r.json();
}

function toast(msg) {
  const d = document.createElement('div');
  d.className = 'toast';
  d.textContent = msg;
  document.body.appendChild(d);
  setTimeout(()=>d.remove(), 2000);
}

// ==================== 页面切换 ====================
function showPage(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  $(id).classList.add('active');
}
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(b=>b.classList.remove('active'));
  $('panel'+name).classList.add('active');
  btn.classList.add('active');
  if (name==='Contact') loadContacts();
  if (name==='Profile') renderProfile();
}
function showModal(id) { $(id).classList.add('show'); }
function closeModal(el) { el.classList.remove('show'); }

// ==================== 登录/注册 ====================
$('loginSwitch').onclick = () => {
  S.isReg = !S.isReg;
  $('extraFields').classList.toggle('show', S.isReg);
  $('loginBtn').textContent = S.isReg ? '注册' : '登录';
  $('loginSwitch').textContent = S.isReg ? '已有账号？登录' : '注册新账号';
};

$('loginBtn').onclick = async () => {
  const email = $('loginEmail').value.trim();
  const pass = $('loginPass').value.trim();
  if (!email||!pass) return showErr('请填写邮箱和密码');
  if (S.isReg && !$('regNick').value.trim()) return showErr('请填写昵称');
  try {
    const ep = S.isReg ? '/api/register' : '/api/login';
    const body = S.isReg
      ? {email, username:email.split('@')[0], password:pass, nickname:$('regNick').value.trim(), role_in_family:$('regRole').value.trim()}
      : {email, password:pass};
    const d = await api(ep, {method:'POST', body:JSON.stringify(body)});
    S.token = d.token; S.user = d.user;
    localStorage.setItem('fc_token', d.token);
    localStorage.setItem('fc_user', JSON.stringify(d.user));
    enterApp();
  } catch(e) { showErr(e.message); }
};
function showErr(m) { const e=$('loginError'); e.textContent=m; e.style.display='block'; setTimeout(()=>e.style.display='none',3000); }
function doLogout() { S.token=''; S.user=null; localStorage.clear(); if(S.ws)S.ws.close(); showPage('loginPage'); }

// ==================== 进入应用 ====================
async function enterApp() {
  showPage('mainPage');
  await loadGroups();
  await loadAgents();
  connectWS();
  renderProfile();
}

// ==================== 群组 ====================
async function loadGroups() {
  try { S.groups = await api('/api/groups'); } catch(e) { console.error(e); }
  renderGroups();
}
function renderGroups() {
  const el = $('panelChat');
  if (!S.groups.length) {
    el.innerHTML = '<div class="empty"><span class="icon">💬</span><p>暂无聊天</p></div>';
    return;
  }
  el.innerHTML = S.groups.map(g => {
    const av = g.avatar||'👥';
    const name = esc(g.name);
    const preview = esc(g.last_message||'');
    const time = fmtTime(g.last_time);
    return `<div class="chat-item" onclick="openChat('${g.id}','${name}','${av}')">
      <div class="chat-avatar">${av}</div>
      <div class="chat-body"><div class="name">${name}</div><div class="preview">${preview}</div></div>
      <div class="chat-meta"><div class="time">${time}</div></div>
    </div>`;
  }).join('');
}
async function doCreateGroup() {
  const name = $('newGroupName').value.trim();
  if (!name) return;
  try {
    await api('/api/groups', {method:'POST', body:JSON.stringify({name, description:$('newGroupDesc').value})});
    closeModal($('createGroupModal'));
    $('newGroupName').value=''; $('newGroupDesc').value='';
    await loadGroups();
    toast('群聊已创建');
  } catch(e) { toast(e.message); }
}

// ==================== 通讯录 ====================
async function loadContacts() {
  let html = '<div class="section-title">数字人</div>';
  for (const a of S.agents) {
    html += `<div class="contact-item"><div class="contact-av">${a.avatar||'🤖'}</div><div class="contact-name">${esc(a.name)}</div><span class="contact-badge">AI</span></div>`;
  }
  if (S.curGroup) {
    try {
      const ms = await api(`/api/groups/${S.curGroup}/members`);
      html += '<div class="section-title">群成员</div>';
      ms.forEach(m => {
        html += `<div class="contact-item"><div class="contact-av">${m.avatar}</div><div class="contact-name">${esc(m.name)}${m.is_agent?'<span class="contact-badge">AI</span>':''}</div></div>`;
      });
    } catch(e) {}
  }
  $('panelContact').innerHTML = html;
}

// ==================== 我的 ====================
function renderProfile() {
  const u = S.user||{};
  $('panelProfile').innerHTML = `
    <div class="profile-hd">
      <div class="profile-av">${u.avatar||'😀'}</div>
      <div class="profile-info"><h2>${esc(u.nickname||u.username||'-')}</h2><p>微信号：${esc(u.email||'-')}</p></div>
    </div>
    <div class="profile-section">
      <div class="profile-row" onclick="showModal('refineModal')"><span class="icon">🧪</span><span class="label">炼化数字人</span><span class="arrow">›</span></div>
      <div class="profile-row"><span class="icon">🤖</span><span class="label">我的数字人</span><span class="arrow">›</span></div>
      <div class="profile-row"><span class="icon">🧠</span><span class="label">记忆库</span><span class="arrow">›</span></div>
      <div class="profile-row"><span class="icon">⚙️</span><span class="label">设置</span><span class="arrow">›</span></div>
    </div>
    <button class="logout-btn" onclick="doLogout()">退出登录</button>`;
}

// ==================== Agent ====================
async function loadAgents() {
  try { S.agents = await api('/api/agents'); } catch(e) {}
}
async function doRefine() {
  const text = $('refineText').value.trim();
  const agentId = S.user?.agent_id||'';
  if (!text) return toast('请输入内容');
  if (!agentId) return toast('无关联Agent');
  try {
    const d = await api('/api/agent/refine/text', {method:'POST', body:JSON.stringify({agent_id:agentId, text, source:'text'})});
    closeModal($('refineModal'));
    toast(d.message||'炼化完成');
    $('refineText').value='';
  } catch(e) { toast(e.message); }
}

// ==================== 聊天 ====================
async function openChat(id, name, av) {
  S.curGroup = id; S.curGroupName = name;
  $('chatTitle').textContent = name;
  showPage('chatPage');
  $('msgList').innerHTML = '<div class="empty"><span class="icon">⏳</span><p>加载中...</p></div>';
  try {
    const msgs = await api(`/api/messages/${id}?limit=100`);
    renderMsgs(msgs);
  } catch(e) {
    $('msgList').innerHTML = '<div class="empty"><span class="icon">❌</span><p>加载失败</p></div>';
  }
}

function renderMsgs(msgs) {
  const el = $('msgList');
  if (!msgs.length) { el.innerHTML = '<div class="empty"><span class="icon">💬</span><p>说点什么吧</p></div>'; return; }
  el.innerHTML = msgs.map(m => buildMsg(m)).join('');
  el.scrollTop = el.scrollHeight;
}

function buildMsg(m) {
  const isMe = m.sender_id === S.user?.id;
  const side = isMe ? 'right' : 'left';
  const av = m.is_agent ? (m.agent_avatar||'🤖') : '😀';
  const tag = m.is_agent ? '<span class="msg-tag">AI</span>' : '';
  let bubble = '';
  if (m.msg_type==='voice' && m.voice_url) {
    bubble = `<div class="voice-bubble" onclick="playVoice(this,'${m.voice_url}')"><span class="icon">🔊</span><div class="voice-wave"><span></span><span></span><span></span><span></span><span></span></div><span class="voice-dur">语音</span></div>`;
  } else if (m.msg_type==='image') {
    bubble = `<img class="msg-img" src="${m.content}" onclick="window.open(this.src)" onerror="this.style.display='none'">`;
  } else {
    bubble = esc(m.content);
  }
  return `<div class="msg-row ${side}">
    <div class="msg-av">${av}</div>
    <div class="msg-content">
      <div class="msg-name">${tag}${esc(m.sender_name)}</div>
      <div class="msg-bubble">${bubble}</div>
      <div class="msg-time">${fmtTime(m.created_at)}</div>
    </div>
  </div>`;
}

function appendMsg(m) {
  const el = $('msgList');
  const empty = el.querySelector('.empty');
  if (empty) empty.remove();
  if (m.is_agent) removeTyping(m.sender_name);
  el.insertAdjacentHTML('beforeend', buildMsg(m));
  el.scrollTop = el.scrollHeight;
}

function showTyping(name) {
  const el = $('msgList');
  el.insertAdjacentHTML('beforeend', `<div class="msg-row left" id="typing-${name}"><div class="msg-av">🤖</div><div class="msg-content"><div class="msg-name">${name}</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div></div>`);
  el.scrollTop = el.scrollHeight;
}
function removeTyping(name) { const e=$('typing-'+name); if(e)e.remove(); }

// ==================== 发送 ====================
async function sendText() {
  const input = $('msgInput');
  const text = input.value.trim();
  if (!text||!S.curGroup) return;
  input.value=''; input.style.height='auto';
  $('sendBtn').disabled = true;
  try {
    const d = await api('/api/messages', {method:'POST', body:JSON.stringify({group_id:S.curGroup, content:text, msg_type:'text'})});
    appendMsg({id:d.id, sender_id:S.user.id, sender_name:S.user.nickname, content:text, msg_type:'text', is_agent:false, created_at:d.created_at});
  } catch(e) { toast('发送失败'); }
  $('sendBtn').disabled = false;
  input.focus();
}

function onKey(e) {
  if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendText(); }
  setTimeout(()=>autoGrow(e.target),0);
}
function autoGrow(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }

// ==================== 图片 ====================
async function sendImage(input) {
  const file = input.files[0];
  if (!file||!S.curGroup) return;
  const form = new FormData(); form.append('file', file);
  try {
    const r = await fetch('/api/upload/image', {method:'POST', headers:{'Authorization':'Bearer '+S.token}, body:form});
    const d = await r.json();
    await api('/api/messages', {method:'POST', body:JSON.stringify({group_id:S.curGroup, content:d.url, msg_type:'image'})});
    appendMsg({id:Date.now(), sender_id:S.user.id, sender_name:S.user.nickname, content:d.url, msg_type:'image', is_agent:false, created_at:Date.now()/1000});
  } catch(e) { toast('上传失败'); }
  input.value='';
}

// ==================== 语音 ====================
let recorder=null, chunks=[];
function toggleVoice() {
  S.voiceMode = !S.voiceMode;
  $('msgInput').style.display = S.voiceMode?'none':'block';
  $('recordBtn').style.display = S.voiceMode?'block':'none';
  $('sendBtn').style.display = S.voiceMode?'none':'block';
  $('voiceToggle').style.color = S.voiceMode?'var(--green)':'';
}
async function recStart() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    recorder = new MediaRecorder(stream, {mimeType:'audio/webm;codecs=opus'});
    chunks=[];
    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.start();
    $('recordBtn').classList.add('recording');
    $('recordBtn').textContent = '松开 结束';
  } catch(e) { toast('需要麦克风权限'); }
}
async function recStop() {
  if (!recorder||recorder.state!=='recording') return;
  $('recordBtn').classList.remove('recording');
  $('recordBtn').textContent = '按住 说话';
  recorder.stop();
  recorder.stream.getTracks().forEach(t=>t.stop());
  recorder.onstop = async () => {
    const blob = new Blob(chunks, {type:'audio/webm'});
    const form = new FormData(); form.append('file', blob, 'voice.webm');
    try {
      const r = await fetch('/api/voice/upload', {method:'POST', headers:{'Authorization':'Bearer '+S.token}, body:form});
      const d = await r.json();
      await api('/api/messages', {method:'POST', body:JSON.stringify({group_id:S.curGroup, content:'[语音消息]', msg_type:'voice', voice_url:d.url})});
      appendMsg({id:Date.now(), sender_id:S.user.id, sender_name:S.user.nickname, content:'[语音消息]', msg_type:'voice', voice_url:d.url, is_agent:false, created_at:Date.now()/1000});
    } catch(e) { toast('发送失败'); }
  };
}
function playVoice(el, url) {
  const audio = new Audio(url);
  el.classList.add('voice-playing');
  audio.play();
  audio.onended = () => el.classList.remove('voice-playing');
}

// ==================== 表情 ====================
const EMOJIS = '😀 😂 🤣 😊 😍 🥰 😘 😋 🤔 😅 😢 😭 😡 🥺 😴 🙏 👍 👎 ❤️ 💔 🎉 🎊 💪 👏 🤝 ✌️ 💐 🌹 🎂 🍰 🍜 🍲 🎣 ♟️ 📰 💊'.split(' ');
function toggleEmoji() {
  const p = $('emojiPanel');
  if (!p.innerHTML) p.innerHTML = EMOJIS.map(e=>`<span class="emoji-item" onclick="insertEmoji('${e}')">${e}</span>`).join('');
  p.classList.toggle('show');
}
function insertEmoji(e) { $('msgInput').value+=e; $('msgInput').focus(); }

// ==================== WebSocket ====================
function connectWS() {
  if (!S.token) return;
  const proto = location.protocol==='https:'?'wss':'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws?token=${S.token}`);
  ws.onopen = () => { S.ws=ws; };
  ws.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type==='message'&&msg.data) {
        if (msg.data.is_agent && msg.data.group_id===S.curGroup) {
          showTyping(msg.data.sender_name);
          setTimeout(()=>appendMsg(msg.data), 1500);
        } else if (msg.data.group_id===S.curGroup) {
          appendMsg(msg.data);
        }
        // 更新列表预览
        const g = S.groups.find(g=>g.id===msg.data.group_id);
        if (g) { g.last_message=msg.data.content; g.last_time=msg.data.created_at; renderGroups(); }
      }
    } catch(err) {}
  };
  ws.onclose = () => setTimeout(connectWS, 3000);
}

// ==================== 工具 ====================
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts*1000), now = new Date();
  const hm = d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
  if (d.toDateString()===now.toDateString()) return hm;
  return (d.getMonth()+1)+'/'+d.getDate()+' '+hm;
}
function goBack() { showPage('mainPage'); S.curGroup=null; loadGroups(); }

// ==================== 初始化 ====================
(async()=>{
  if (S.token&&S.user) {
    try { await api('/api/me'); enterApp(); } catch { doLogout(); }
  } else { showPage('loginPage'); }
})();
</script>
